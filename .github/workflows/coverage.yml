name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tarpaulin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target"

      - name: Install tarpaulin
        run: which cargo-tarpaulin || cargo install cargo-tarpaulin --locked

      - name: Run tarpaulin
        run: >-
          cargo tarpaulin -p kamekichi-ws --skip-clean --engine llvm
          --exclude-files 'crates/kamekichi/*' --exclude-files 'crates/kamekichi-discord/*'
          --exclude-files 'crates/kippe/*' --exclude-files 'crates/testbed/*'
          --fail-under 97
