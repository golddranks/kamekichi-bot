s!(\n        ws.send_close(1015, \"\"),\n        Err(Error::Fatal(CallerError::InvalidCloseCode(1015)))\n    ));\n}\n\n#[test]\nfn send_close_allows_private_use() {\n    let mut ws = ws(Vec::new());\n    ws.send_close(4000, \"private\").unwrap();\n}\n\n// ---- Partial reads ----\n\n#[test]\nfn partial_read_one_byte_at_a_time() {\n    let data = frame(true, OP_TEXT, b\"hello world\");\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ChunkedMock::new(data, 1));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"hello world\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn partial_read_16bit_frame() {\n    let payload = vec![b'y'; 300];\n    let data = frame(true, OP_TEXT, \u0026payload);\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ChunkedMock::new(data, 3));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e {\n            assert_eq!(p.len(), 300);\n            assert!(p.bytes().all(|b| b == b'y'));\n        }\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn partial_read_masked_frame_rejected() {\n    let mask = [0xAA, 0xBB, 0xCC, 0xDD];\n    let data = masked_frame(true, OP_TEXT, b\"chunked\", mask);\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ChunkedMock::new(data, 1));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::MaskedServerFrame))\n    ));\n}\n\n// ---- WouldBlock recovery ----\n\n#[test]\nfn would_block_then_read_succeeds() {\n    // fill_at_least resizes the buffer before calling read(). If read()\n    // returns WouldBlock, the zero-padding must be truncated so the next\n    // read_message call sees a clean buffer.\n    let data = frame(true, OP_TEXT, b\"hello\");\n    let mut ws =\n        WebSocket::new(CounterRng(0)).with_stream(ChunkedMock::with_blocks(data, usize::MAX, 1));\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"hello\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- Write-blocking mock for send buffer tests ----\n\nstruct WriteBlockingMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n}\n\nimpl WriteBlockingMock {\n    fn new(data: Vec\u003cu8\u003e) -\u003e Self {\n        WriteBlockingMock {\n            rx: Cursor::new(data),\n        }\n    }\n}\n\nimpl Read for WriteBlockingMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for WriteBlockingMock {\n    fn write(\u0026mut self, _buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n// ---- Flood detection ----\n\n#[test]\nfn flood_detected() {\n    // All pings pre-buffered → large initial read, then bytes_read=0\n    // for subsequent frames → no score decrement → score climbs.\n    let mut data = Vec::new();\n    for _ in 0..5 {\n        data.extend(frame(true, OP_PING, b\"\"));\n    }\n    let mut ws = WebSocket::new(CounterRng(0))\n        .max_flood_score(3)\n        .with_stream(MockStream::new(data));\n\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::Flood))\n    ));\n}\n\n// ---- Pong suppression under buffer pressure ----\n\n#[test]\nfn pong_suppressed_when_send_buffer_full() {\n    // Writes are blocked, so the first pong stays in the send buffer.\n    // With max_buf_size=125, subsequent pings have their pongs\n    // suppressed (pending_len \u003e= max_buf_size).\n    let mut data = Vec::new();\n    for _ in 0..5 {\n        data.extend(frame(true, OP_PING, b\"\"));\n    }\n    data.extend(frame(true, OP_TEXT, b\"done\"));\n\n    let mut ws = WebSocket::new(CounterRng(0))\n        .max_buf_size(125)\n        .with_stream(WriteBlockingMock::new(data));\n\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"done\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- Fragmented message too large ----\n\n#[test]\nfn fragmented_message_too_large_text() {\n    let mut data = Vec::new();\n    data.extend(frame(false, OP_TEXT, \u0026[b'a'; 100]));\n    data.extend(frame(true, OP_CONTINUATION, \u0026[b'b'; 100]));\n\n    let mut ws = WebSocket::new(CounterRng(0))\n        .max_payload(150)\n        .with_stream(MockStream::new(data));\n\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::FragmentedMessageTooLarge(200)))\n    ));\n}\n\n#[test]\nfn fragmented_message_too_large_bin() {\n    let mut data = Vec::new();\n    data.extend(frame(false, OP_BINARY, \u0026[b'a'; 100]));\n    data.extend(frame(true, OP_CONTINUATION, \u0026[b'b'; 100]));\n\n    let mut ws = WebSocket::new(CounterRng(0))\n        .max_payload(150)\n        .with_stream(MockStream::new(data));\n\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::FragmentedMessageTooLarge(200)))\n    ));\n}\n\n// ---- Wire encoding validation ----\n\n#[test]\nfn non_minimal_16bit_length() {\n    // Payload of 50 bytes encoded with 16-bit length (should use 7-bit)\n    let mut data = Vec::new();\n    data.push(0x81); // FIN + text\n    data.push(126); // 16-bit length follows\n    data.extend_from_slice(\u002650u16.to_be_bytes());\n    data.extend_from_slice(\u0026[b'x'; 50]);\n\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::NonMinimalLength))\n    ));\n}\n\n#[test]\nfn non_minimal_64bit_length() {\n    // Payload of 200 bytes encoded with 64-bit length (should use 16-bit)\n    let mut data = Vec::new();\n    data.push(0x81); // FIN + text\n    data.push(127); // 64-bit length follows\n    data.extend_from_slice(\u0026200u64.to_be_bytes());\n    data.extend_from_slice(\u0026[b'x'; 200]);\n\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::NonMinimalLength))\n    ));\n}\n\n#[test]\nfn payload_length_msb_set() {\n    let mut data = Vec::new();\n    data.push(0x82); // FIN + binary\n    data.push(127); // 64-bit length follows\n    data.extend_from_slice(\u0026(1u64 \u003c\u003c 63).to_be_bytes());\n    // No payload bytes needed — error triggers before payload read\n\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::PayloadLengthMsb))\n    ));\n}\n\n// ---- Close code validation (receive) ----\n\n#[test]\nfn recv_close_code_1005_rejected() {\n    let mut ws = ws(frame(true, OP_CLOSE, \u00261005u16.to_be_bytes()));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidCloseCode(1005)))\n    ));\n}\n\n#[test]\nfn recv_close_code_1006_rejected() {\n    let mut ws = ws(frame(true, OP_CLOSE, \u00261006u16.to_be_bytes()));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidCloseCode(1006)))\n    ));\n}\n\n#[test]\nfn recv_close_code_1015_rejected() {\n    let mut ws = ws(frame(true, OP_CLOSE, \u00261015u16.to_be_bytes()));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidCloseCode(1015)))\n    ));\n}\n\n// ---- Control frame budget ----\n\n#[test]\nfn frame_budget_returns_none() {\n    let mut data = Vec::new();\n    for _ in 0..5 {\n        data.extend(frame(true, OP_PING, b\"\"));\n    }\n    data.extend(frame(true, OP_TEXT, b\"after\"));\n\n    let mut ws = WebSocket::new(CounterRng(0))\n        .frame_budget(3)\n        .with_stream(MockStream::new(data));\n\n    // First call: processes 3 pings, budget exhausted\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n\n    // Second call: processes remaining 2 pings, then returns text\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"after\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- try_connect recovery ----\n\n#[test]\nfn try_connect_recovers_on_handshake_failure() {\n    let rx = b\"HTTP/1.1 200 OK\\r\\nContent-Length: 0\\r\\n\\r\\n\".to_vec();\n    let ws = WebSocket::new(CounterRng(0));\n    let Err((err, ws, _stream)) =\n        ws.try_connect(ConnectMock::with_response(rx), \"example.com\", \"/\")\n    else {\n        panic!(\"expected error\");\n    };\n    assert!(matches!(err, Error::Reconnect(ConnError::BadStatus)));\n    // Recovered WebSocket can be reused for a new connection.\n    let _ws = ws\n        .connect(ConnectMock::auto(), \"example.com\", \"/ws\")\n        .unwrap();\n}\n\n#[test]\nfn try_connect_recovers_on_invalid_header() {\n    let ws = WebSocket::new(CounterRng(0));\n    let Err((err, ws, _stream)) = ws.try_connect(ConnectMock::auto(), \"bad\\nhost\", \"/\") else {\n        panic!(\"expected error\");\n    };\n    assert!(matches!(err, Error::Fatal(CallerError::InvalidHeaderValue)));\n    // Stream was never touched; WebSocket reusable.\n    let _ws = ws\n        .connect(ConnectMock::auto(), \"example.com\", \"/ws\")\n        .unwrap();\n}\n\n#[test]\nfn try_connect_invalid_path() {\n    let ws = WebSocket::new(CounterRng(0));\n    let Err((err, _ws, _stream)) = ws.try_connect(ConnectMock::auto(), \"example.com\", \"/bad\\npath\")\n    else {\n        panic!(\"expected error\");\n    };\n    assert!(matches!(err, Error::Fatal(CallerError::InvalidHeaderValue)));\n}\n\n// ---- Display / Error trait coverage ----\n\nfn make_utf8_error() -\u003e std::str::Utf8Error {\n    std::str::from_utf8(std::hint::black_box(\u0026[0xFF])).unwrap_err()\n}\n\n#[test]\nfn connection_error_display() {\n    let cases: \u0026[ConnError] = \u0026[\n        ConnError::Io(io::Error::other(\"test\")),\n        ConnError::Closed,\n        ConnError::HeadersTooLarge,\n        ConnError::BadStatus,\n        ConnError::MissingAccept,\n        ConnError::BadAccept,\n        ConnError::BadReservedBits(0x10),\n        ConnError::PayloadTooLarge(999),\n        ConnError::UnexpectedContinuation,\n        ConnError::FragmentedMessageTooLarge(999),\n        ConnError::InvalidUtf8(make_utf8_error()),\n        ConnError::DataDuringFragmentation,\n        ConnError::FragmentedControl,\n        ConnError::ControlPayloadTooLarge(200),\n        ConnError::BadClosePayload,\n        ConnError::UnknownOpcode(0x03),\n        ConnError::NonMinimalLength,\n        ConnError::PayloadLengthMsb,\n        ConnError::MissingUpgrade,\n        ConnError::MissingConnection,\n        ConnError::InvalidCloseCode(9999),\n        ConnError::MaskedServerFrame,\n        ConnError::Flood,\n        ConnError::InvalidSubprotocol,\n        ConnError::PingTimeout,\n    ];\n    for e in cases {\n        assert!(!e.to_string().is_empty());\n    }\n}\n\n#[test]\nfn connection_error_source() {\n    let io_err = ConnError::Io(io::Error::other(\"t\"));\n    assert!(std::error::Error::source(\u0026io_err).is_some());\n    let utf8_err = ConnError::InvalidUtf8(make_utf8_error());\n    assert!(std::error::Error::source(\u0026utf8_err).is_some());\n    let other = ConnError::Closed;\n    assert!(std::error::Error::source(\u0026other).is_none());\n}\n\n#[test]\nfn caller_error_display() {\n    let cases: \u0026[CallerError] = \u0026[\n        CallerError::Closing,\n        CallerError::InvalidHeaderValue,\n        CallerError::InvalidCloseCode(999),\n        CallerError::CloseReasonTooLong(200),\n    ];\n    for e in cases {\n        assert!(!e.to_string().is_empty());\n    }\n    // std::error::Error is implemented\n    assert!(std::error::Error::source(\u0026CallerError::Closing).is_none());\n}\n\n#[test]\nfn error_display_and_source() {\n    let r = Error::Reconnect(ConnError::Closed);\n    assert!(!r.to_string().is_empty());\n    assert!(std::error::Error::source(\u0026r).is_some());\n    let f = Error::Fatal(CallerError::Closing);\n    assert!(!f.to_string().is_empty());\n    assert!(std::error::Error::source(\u0026f).is_some());\n}\n\n#[test]\nfn from_impls() {\n    // From\u003cUtf8Error\u003e for ConnError\n    let _: ConnError = make_utf8_error().into();\n    // From\u003cFillFromError\u003e for ConnError\n    let e: ConnError = crate::read_buf::FillError::Eof.into();\n    assert!(matches!(e, ConnError::Closed));\n    // From\u003cFlushError\u003e for Error\n    let _: Error = crate::send_buf::FlushError::WriteClosed.into();\n}\n\n// ---- read_message after close ----\n\n#[test]\nfn read_message_after_close_is_fatal() {\n    let mut ws = ws(frame(true, OP_CLOSE, b\"\"));\n    ws.read_message().unwrap(); // consumes close\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Fatal(CallerError::Closing))\n    ));\n}\n\n// ---- send_frame after close ----\n\n#[test]\nfn send_after_close_is_fatal() {\n    let mut ws = ws(Vec::new());\n    ws.send_close(1000, \"\").unwrap();\n    assert!(matches!(\n        ws.send_text(\"x\"),\n        Err(Error::Fatal(CallerError::Closing))\n    ));\n}\n\n// ---- send_binary ----\n\n#[test]\nfn send_binary_verified() {\n    let mut ws = ws(Vec::new());\n    ws.send_binary(b\"data\").unwrap();\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_BINARY);\n    assert_eq!(payload, b\"data\");\n}\n\n// ---- send_close reason too long ----\n\n#[test]\nfn send_close_reason_too_long() {\n    let mut ws = ws(Vec::new());\n    let reason = \"x\".repeat(124);\n    assert!(matches!(\n        ws.send_close(1000, \u0026reason),\n        Err(Error::Fatal(CallerError::CloseReasonTooLong(124)))\n    ));\n}\n\n// ---- recv close code out of range ----\n\n#[test]\nfn recv_close_code_out_of_range() {\n    let mut ws = ws(frame(true, OP_CLOSE, \u00265000u16.to_be_bytes()));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidCloseCode(5000)))\n    ));\n}\n\n// ---- build_frame 64-bit length ----\n\n#[test]\nfn send_binary_64bit_length() {\n    let payload = vec![0u8; 65536];\n    let mut ws = ws(Vec::new());\n    ws.send_binary(\u0026payload).unwrap();\n    let (opcode, decoded) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_BINARY);\n    assert_eq!(decoded.len(), 65536);\n}\n\n// ---- data frame exceeds max_payload (non-64bit path) ----\n\n#[test]\nfn data_frame_exceeds_max_payload() {\n    let payload = vec![b'x'; 126];\n    let mut ws = WebSocket::new(CounterRng(0))\n        .max_payload(125)\n        .with_stream(MockStream::new(frame(true, OP_TEXT, \u0026payload)));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::PayloadTooLarge(126)))\n    ));\n}\n\n// ---- builder asserts ----\n\n#[test]\nfn max_payload_clamped_low() {\n    let ws = WebSocket::new(CounterRng(0)).max_payload(1);\n    assert_eq!(ws.sess.max_payload, 125);\n}\n\n#[test]\nfn max_payload_clamped_high() {\n    let ws = WebSocket::new(CounterRng(0)).max_payload(usize::MAX);\n    assert_eq!(ws.sess.max_payload, isize::MAX as usize);\n}\n\n#[test]\nfn max_buf_size_clamped() {\n    let ws = WebSocket::new(CounterRng(0)).max_buf_size(1);\n    assert_eq!(ws.sess.max_buf_size, 125);\n}\n\n#[test]\nfn frame_budget_clamped() {\n    let ws = WebSocket::new(CounterRng(0)).frame_budget(0);\n    assert_eq!(ws.sess.frame_budget, 1);\n}\n\n// ---- Additional mocks for send/flush paths ----\n\n/// Write blocks first N calls, then accepts.\nstruct BlockFirstNWritesMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n    remaining_blocks: usize,\n}\n\nimpl Read for BlockFirstNWritesMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for BlockFirstNWritesMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.remaining_blocks \u003e 0 {\n            self.remaining_blocks -= 1;\n            Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n        } else {\n            self.tx.extend_from_slice(buf);\n            Ok(buf.len())\n        }\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Write blocks first N calls, then returns hard error.\nstruct BlockThenErrorMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    blocks: usize,\n}\n\nimpl Read for BlockThenErrorMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for BlockThenErrorMock {\n    fn write(\u0026mut self, _buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.blocks \u003e 0 {\n            self.blocks -= 1;\n            Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n        } else {\n            Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"))\n        }\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Write returns Ok(0) (simulating a closed stream).\nstruct WriteZeroMock;\n\nimpl Read for WriteZeroMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Ok(0)\n    }\n}\n\nimpl Write for WriteZeroMock {\n    fn write(\u0026mut self, _buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        Ok(0)\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Write returns a hard error.\nstruct WriteErrorMock;\n\nimpl Read for WriteErrorMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Ok(0)\n    }\n}\n\nimpl Write for WriteErrorMock {\n    fn write(\u0026mut self, _buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"))\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Writes succeed, but flush() returns WouldBlock.\nstruct StreamFlushBlocksMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl Read for StreamFlushBlocksMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for StreamFlushBlocksMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Err(io::Error::new(io::ErrorKind::WouldBlock, \"flush blocked\"))\n    }\n}\n\n/// Writes succeed, but flush() returns a hard error.\nstruct StreamFlushErrorMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl Read for StreamFlushErrorMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for StreamFlushErrorMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"))\n    }\n}\n\n/// Read returns Interrupted once, then reads normally.\nstruct InterruptOnceThenRead {\n    inner: Cursor\u003cVec\u003cu8\u003e\u003e,\n    interrupt: bool,\n}\n\nimpl Read for InterruptOnceThenRead {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.interrupt {\n            self.interrupt = false;\n            Err(io::Error::new(io::ErrorKind::Interrupted, \"interrupted\"))\n        } else {\n            self.inner.read(buf)\n        }\n    }\n}\n\n/// Write returns Interrupted once, then writes normally.\nstruct InterruptOnceWriter {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n    interrupt: bool,\n}\n\nimpl Read for InterruptOnceWriter {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for InterruptOnceWriter {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.interrupt {\n            self.interrupt = false;\n            Err(io::Error::new(io::ErrorKind::Interrupted, \"interrupted\"))\n        } else {\n            self.tx.extend_from_slice(buf);\n            Ok(buf.len())\n        }\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n// ---- Send/flush path tests ----\n\n#[test]\nfn send_queued_then_retry_later() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteBlockingMock::new(Vec::new()));\n    // First send: builds frame, flush blocks → Queued\n    assert_eq!(ws.send_text(\"a\").unwrap(), SendStatus::Queued);\n    // Second send: has_pending, flush blocks → RetryLater\n    assert_eq!(ws.send_text(\"b\").unwrap(), SendStatus::RetryLater);\n}\n\n#[test]\nfn send_pending_flush_hard_error() {\n    let stream = BlockThenErrorMock {\n        rx: Cursor::new(Vec::new()),\n        blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    // First send: flush blocks → Queued\n    assert_eq!(ws.send_text(\"a\").unwrap(), SendStatus::Queued);\n    // Second send: has_pending, flush → ConnectionReset\n    assert!(matches!(\n        ws.send_text(\"b\"),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n#[test]\nfn send_frame_flush_hard_error() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteErrorMock);\n    assert!(matches!(\n        ws.send_text(\"hello\"),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n#[test]\nfn send_write_zero_is_closed() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteZeroMock);\n    assert!(matches!(\n        ws.send_text(\"hello\"),\n        Err(Error::Reconnect(ConnError::Closed))\n    ));\n}\n\n#[test]\nfn send_interrupted_retries() {\n    let stream = InterruptOnceWriter {\n        rx: Cursor::new(Vec::new()),\n        tx: Vec::new(),\n        interrupt: true,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    assert_eq!(ws.send_text(\"hello\").unwrap(), SendStatus::Done);\n}\n\n// ---- WebSocket::flush paths ----\n\n#[test]\nfn flush_no_pending() {\n    let mut ws = ws(Vec::new());\n    assert_eq!(ws.flush().unwrap(), SendStatus::Done);\n}\n\n#[test]\nfn flush_clears_pending() {\n    let stream = BlockFirstNWritesMock {\n        rx: Cursor::new(Vec::new()),\n        tx: Vec::new(),\n        remaining_blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    assert_eq!(ws.send_text(\"hello\").unwrap(), SendStatus::Queued);\n    assert_eq!(ws.flush().unwrap(), SendStatus::Done);\n}\n\n#[test]\nfn flush_pending_blocked() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteBlockingMock::new(Vec::new()));\n    assert_eq!(ws.send_text(\"hello\").unwrap(), SendStatus::Queued);\n    assert_eq!(ws.flush().unwrap(), SendStatus::Queued);\n}\n\n#[test]\nfn flush_pending_hard_error() {\n    let stream = BlockThenErrorMock {\n        rx: Cursor::new(Vec::new()),\n        blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    assert_eq!(ws.send_text(\"a\").unwrap(), SendStatus::Queued);\n    assert!(matches!(\n        ws.flush(),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n#[test]\nfn flush_stream_flush_would_block() {\n    let stream = StreamFlushBlocksMock {\n        rx: Cursor::new(Vec::new()),\n        tx: Vec::new(),\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    // No pending send data, goes straight to stream.flush() → WouldBlock\n    assert_eq!(ws.flush().unwrap(), SendStatus::Queued);\n}\n\n#[test]\nfn flush_stream_flush_hard_error() {\n    let stream = StreamFlushErrorMock {\n        rx: Cursor::new(Vec::new()),\n        tx: Vec::new(),\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    assert!(matches!(\n        ws.flush(),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n// ---- Pending send during read_message ----\n\n#[test]\nfn pending_send_flushed_on_next_read() {\n    let mut data = frame(true, OP_PING, b\"p\");\n    data.extend(frame(true, OP_TEXT, b\"a\"));\n    data.extend(frame(true, OP_TEXT, b\"b\"));\n    let stream = BlockFirstNWritesMock {\n        rx: Cursor::new(data),\n        tx: Vec::new(),\n        remaining_blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    // First read: ping → pong queued (write blocked), returns text \"a\"\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"a\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n    // Second read: pending pong flushed (write succeeds), returns text \"b\"\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"b\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn pending_send_would_block_during_read() {\n    let mut data = frame(true, OP_PING, b\"p\");\n    data.extend(frame(true, OP_TEXT, b\"a\"));\n    data.extend(frame(true, OP_TEXT, b\"b\"));\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteBlockingMock::new(data));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"a\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"b\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- Fragment buffer shrinking ----\n\n#[test]\nfn fragment_buf_shrinks_after_large_message_text() {\n    let mut data = frame(false, OP_TEXT, \u0026[b'a'; 200]);\n    data.extend(frame(true, OP_CONTINUATION, \u0026[b'b'; 200]));\n    // Need a third message so the second read_message call enters the\n    // loop and hits the fragment_buf shrink check.\n    data.extend(frame(true, OP_TEXT, b\"done\"));\n    // Use max_buf_size=125 so fragment_buf (capacity ~400) \u003e max_buf_size.\n    // CounterRng(7): build mask uses rng(7), then the shrink checks use\n    // rng(8)=8 which passes \u00260b111==0.  But there are no mask calls here\n    // (no sends), so we need the rng call in maybe_shrink_capacity and\n    // fragment_buf check to land on multiples of 8.\n    // CounterRng(0): first rng call is maybe_shrink_capacity(0→0\u00267=0),\n    // then fragment check rng(1→1\u00267≠0).  Won't trigger.\n    // CounterRng(7): first rng call(7→7\u00267≠0) skip shrink_capacity,\n    // fragment check rng(8→8\u00267=0) triggers!  But maybe_compact/shrink\n    // may or may not call rng depending on conditions.\n    // Simplest: use a Rng that always returns 0.\n    let mut ws = WebSocket::new(ZeroRng)\n        .max_buf_size(125)\n        .with_stream(MockStream::new(data));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t.len(), 400),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"done\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn fragment_buf_shrinks_after_large_message_bin() {\n    // Same as above, but for binary messages.\n    let mut data = frame(false, OP_BINARY, \u0026[b'a'; 200]);\n    data.extend(frame(true, OP_CONTINUATION, \u0026[b'b'; 200]));\n    data.extend(frame(true, OP_TEXT, b\"done\"));\n    let mut ws = WebSocket::new(ZeroRng)\n        .max_buf_size(125)\n        .with_stream(MockStream::new(data));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Binary(t) =\u003e assert_eq!(t.len(), 400),\n        other =\u003e panic!(\"expected Binary, got {other:?}\"),\n    }\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"done\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n/// RNG that always returns 0 — deterministic for shrink tests.\nstruct ZeroRng;\n\nimpl Rng for ZeroRng {\n    fn fill_bytes(\u0026mut self, dest: \u0026mut [u8]) {\n        dest.fill(0);\n    }\n\n    fn next_u32(\u0026mut self) -\u003e u32 {\n        0\n    }\n}\n\n// ---- send_buf::maybe_shrink ----\n\n#[test]\nfn send_buf_shrinks_after_large_send() {\n    // CounterRng(7): mask call returns 7 (counter→8),\n    // maybe_shrink call returns 8 (8\u00267=0 → triggers shrink).\n    let mut ws = WebSocket::new(CounterRng(7))\n        .max_buf_size(125)\n        .with_stream(MockStream::new(Vec::new()));\n    ws.send_text(\"hello\").unwrap();\n    // The send buffer started at capacity 256, which exceeds max_buf_size=125.\n    // maybe_shrink should have triggered.\n}\n\n// ---- send_buf::flush write returns 0 ----\n\n#[test]\nfn send_buf_flush_write_zero() {\n    let mut send = SendBuf::with_capacity(16);\n    send.push(b\"hello\");\n    let mut stream = WriteZeroMock;\n    assert!(matches!(\n        send.flush(\u0026mut stream),\n        Err(crate::send_buf::FlushError::WriteClosed)\n    ));\n}\n\n// ---- read_buf::read_until coverage ----\n\n#[test]\nfn read_until_pre_existing_data() {\n    let mut buf = ReadBuf::with_capacity(64);\n    // Fill buffer with some data first.\n    buf.fill_from(\u0026mut Cursor::new(b\"hello world\".to_vec()), 5)\n        .unwrap();\n    buf.consume(2); // pending = \"llo world...\" (start=2, end≥5)\n    // read_until sees pre-existing data (end \u003e start) and the callback\n    // returns immediately.\n    let result = buf\n        .read_until::\u003c_, ReadUntilError\u003c()\u003e\u003e(\u0026mut Cursor::new(Vec::new()), 64, |b| {\n            if b.pending().len() \u003e= 3 {\n                Ok(Some(b.pending().len()))\n            } else {\n                Ok(None)\n            }\n        })\n        .unwrap();\n    assert!(result \u003e= 3);\n}\n\n#[test]\nfn read_until_buffer_full() {\n    let mut buf = ReadBuf::with_capacity(16);\n    let data = vec![b'x'; 100];\n    let result = buf.read_until::\u003c(), ReadUntilError\u003c()\u003e\u003e(\n        \u0026mut Cursor::new(data),\n        16,\n        |_| Ok(None), // never accept\n    );\n    assert!(matches!(result, Err(ReadUntilError::LimitReached)));\n\n    assert_eq!(buf.start_offset(), 0);\n    assert_eq!(buf.end_offset(), 100);\n\n    let result = buf.read_until::\u003c(), ReadUntilError\u003c()\u003e\u003e(\n        \u0026mut Cursor::new([]),\n        16,\n        |_| Ok(None), // never accept\n    );\n    assert!(matches!(result, Err(ReadUntilError::LimitReached)));\n}\n\n#[test]\nfn read_until_interrupted() {\n    let mut buf = ReadBuf::with_capacity(64);\n    let mut reader = InterruptOnceThenRead {\n        inner: Cursor::new(b\"hello\".to_vec()),\n        interrupt: true,\n    };\n    buf.read_until::\u003c_, ReadUntilError\u003c()\u003e\u003e(\u0026mut reader, 64, |b| {\n        if b.pending().len() \u003e= 5 {\n            Ok(Some(()))\n        } else {\n            Ok(None)\n        }\n    })\n    .unwrap();\n}\n\n#[test]\nfn read_until_io_error() {\n    let mut buf = ReadBuf::with_capacity(64);\n    struct ErrorReader;\n    impl Read for ErrorReader {\n        fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n            Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"))\n        }\n    }\n    let result = buf.read_until::\u003c(), ReadUntilError\u003c()\u003e\u003e(\u0026mut ErrorReader, 64, |_| Ok(None));\n    assert!(matches!(result, Err(ReadUntilError::Io(_))));\n}\n\n#[test]\nfn read_until_would_block() {\n    let mut buf = ReadBuf::with_capacity(64);\n    struct WouldBlockReader;\n    impl Read for WouldBlockReader {\n        fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n            Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n        }\n    }\n    let result = buf.read_until::\u003c(), ReadUntilError\u003c()\u003e\u003e(\u0026mut WouldBlockReader, 64, |_| Ok(None));\n    assert!(matches!(result, Err(ReadUntilError::WouldBlock)));\n}\n\n#[test]\nfn read_buf_debug_format() {\n    let mut buf = ReadBuf::with_capacity(64);\n    buf.fill_from(\u0026mut Cursor::new(b\"hello\".to_vec()), 5)\n        .unwrap();\n    let dbg = format!(\"{buf:?}\");\n    assert!(dbg.contains(\"ReadBuf\"));\n    assert!(dbg.contains(\"start\"));\n}\n\n#[test]\nfn read_buf_shrinks_after_large_fill() {\n    let mut buf = ReadBuf::with_capacity(64);\n    // Fill with enough data to grow capacity well past 128.\n    buf.fill_from(\u0026mut Cursor::new(vec![b'x'; 8192]), 8192)\n        .unwrap();\n    buf.consume(8192);\n    buf.compact();\n    // ZeroRng always returns 0, so one_in_eight_odds (0 \u0026 0b111 == 0) triggers.\n    // This exercises the truncate + shrink_to path.\n    buf.maybe_shrink_capacity(128, \u0026mut ZeroRng);\n    // Buffer still works after shrinking.\n    buf.fill_from(\u0026mut Cursor::new(b\"hello\".to_vec()), 5)\n        .unwrap();\n    assert_eq!(buf.pending(), b\"hello\");\n}\n\n// ---- Pending send hard error during read_message ----\n\n#[test]\nfn pending_send_hard_error_during_read() {\n    let mut data = frame(true, OP_PING, b\"p\");\n    data.extend(frame(true, OP_TEXT, b\"a\"));\n    data.extend(frame(true, OP_TEXT, b\"b\"));\n    let stream = BlockThenErrorMock {\n        rx: Cursor::new(data),\n        blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    // First read: ping → pong queued (write blocked), returns text \"a\"\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"a\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n    // Second read: pending pong flush → hard error\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n// ---- send_frame: pending flush succeeds then new frame sent ----\n\n#[test]\nfn send_pending_flush_succeeds_then_sends() {\n    let stream = BlockFirstNWritesMock {\n        rx: Cursor::new(Vec::new()),\n        tx: Vec::new(),\n        remaining_blocks: 1,\n    };\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(stream);\n    assert_eq!(ws.send_text(\"a\").unwrap(), SendStatus::Queued);\n    // Pending data from \"a\" is flushed (write now succeeds), then \"b\" is built + sent\n    assert_eq!(ws.send_text(\"b\").unwrap(), SendStatus::Done);\n}\n\n// ---- flush: stream.flush TimedOut variant ----\n\n#[test]\nfn flush_stream_flush_timed_out() {\n    struct TimedOutFlushMock;\n    impl Read for TimedOutFlushMock {\n        fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n            Ok(0)\n        }\n    }\n    impl Write for TimedOutFlushMock {\n        fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n            Ok(buf.len())\n        }\n        fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n            Err(io::Error::new(io::ErrorKind::TimedOut, \"timed out\"))\n        }\n    }\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(TimedOutFlushMock);\n    assert_eq!(ws.flush().unwrap(), SendStatus::Queued);\n}\n\n// ---- Subprotocol negotiation ----\n\n#[test]\nfn connect_with_subprotocol() {\n    let ws = WebSocket::new(CounterRng(0))\n        .subprotocols(\u0026[\"chat\", \"superchat\"])\n        .connect(\n            ConnectMock::auto_with_subprotocol(\"chat\"),\n            \"example.com\",\n            \"/ws\",\n        )\n        .unwrap();\n    assert_eq!(ws.subprotocol(), Some(\"chat\"));\n    // Verify the request included the Sec-WebSocket-Protocol header.\n    let req = \u0026ws.inner().tx;\n    assert!(\n        req.windows(b\"Sec-WebSocket-Protocol: chat, superchat\".len())\n            .any(|w| w == b\"Sec-WebSocket-Protocol: chat, superchat\")\n    );\n}\n\n#[test]\nfn connect_subprotocol_not_offered() {\n    let result = WebSocket::new(CounterRng(0))\n        .subprotocols(\u0026[\"chat\", \"superchat\"])\n        .connect(\n            ConnectMock::auto_with_subprotocol(\"nope\"),\n            \"example.com\",\n            \"/ws\",\n        );\n    assert!(matches!(\n        result,\n        Err(Error::Reconnect(ConnError::InvalidSubprotocol))\n    ));\n}\n\n#[test]\nfn connect_subprotocol_unrequested() {\n    // Client doesn't set subprotocols, but server sends one.\n    let result = WebSocket::new(CounterRng(0)).connect(\n        ConnectMock::auto_with_subprotocol(\"chat\"),\n        \"example.com\",\n        \"/ws\",\n    );\n    assert!(matches!(\n        result,\n        Err(Error::Reconnect(ConnError::InvalidSubprotocol))\n    ));\n}\n\n// ---- Custom headers ----\n\n#[test]\nfn connect_with_headers_success() {\n    let ws = WebSocket::new(CounterRng(0))\n        .connect_with_headers(\n            ConnectMock::auto(),\n            \"example.com\",\n            \"/ws\",\n            \u0026[(\"Authorization\", \"Bearer tok\")],\n        )\n        .unwrap();\n    let req = \u0026ws.inner().tx;\n    assert!(\n        req.windows(b\"Authorization: Bearer tok\".len())\n            .any(|w| w == b\"Authorization: Bearer tok\")\n    );\n}\n\n#[test]\nfn try_connect_rejects_header_name_crlf() {\n    let result = WebSocket::new(CounterRng(0)).try_connect_with_headers(\n        ConnectMock::auto(),\n        \"example.com\",\n        \"/ws\",\n        \u0026[(\"Bad\\r\\nName\", \"value\")],\n    );\n    assert!(matches!(\n        result,\n        Err((Error::Fatal(CallerError::InvalidHeaderValue), _, _))\n    ));\n}\n\n#[test]\nfn try_connect_rejects_header_value_crlf() {\n    let result = WebSocket::new(CounterRng(0)).try_connect_with_headers(\n        ConnectMock::auto(),\n        \"example.com\",\n        \"/ws\",\n        \u0026[(\"Name\", \"bad\\r\\nvalue\")],\n    );\n    assert!(matches!(\n        result,\n        Err((Error::Fatal(CallerError::InvalidHeaderValue), _, _))\n    ));\n}\n\n#[test]\nfn try_connect_rejects_space_in_path() {\n    let result = WebSocket::new(CounterRng(0)).try_connect_with_headers(\n        ConnectMock::auto(),\n        \"example.com\",\n        \"/ws path\",\n        \u0026[],\n    );\n    assert!(matches!(\n        result,\n        Err((Error::Fatal(CallerError::InvalidHeaderValue), _, _))\n    ));\n}\n\n#[test]\nfn try_connect_rejects_space_in_header_name() {\n    let result = WebSocket::new(CounterRng(0)).try_connect_with_headers(\n        ConnectMock::auto(),\n        \"example.com\",\n        \"/ws\",\n        \u0026[(\"Bad Name\", \"value\")],\n    );\n    assert!(matches!(\n        result,\n        Err((Error::Fatal(CallerError::InvalidHeaderValue), _, _))\n    ));\n}\n\n#[test]\nfn try_connect_rejects_colon_in_header_name() {\n    let result = WebSocket::new(CounterRng(0)).try_connect_with_headers(\n        ConnectMock::auto(),\n        \"example.com\",\n        \"/ws\",\n        \u0026[(\"Bad:Name\", \"value\")],\n    );\n    assert!(matches!(\n        result,\n        Err((Error::Fatal(CallerError::InvalidHeaderValue), _, _))\n    ));\n}\n\n// ---- inner_mut ----\n\n#[test]\nfn inner_mut_accessible() {\n    let mut ws = ws(frame(true, OP_TEXT, b\"hi\"));\n    let _stream: \u0026mut MockStream = ws.inner_mut();\n}\n\n// ---- Frame budget on continuation frames ----\n\n#[test]\nfn frame_budget_on_continuation_frames() {\n    let mut data = Vec::new();\n    data.extend(frame(false, OP_TEXT, b\"1\"));\n    for i in 2..=6 {\n        data.extend(frame(false, OP_CONTINUATION, \u0026[b'0' + i]));\n    }\n    data.extend(frame(true, OP_CONTINUATION, b\"7\"));\n\n    let mut ws = WebSocket::new(CounterRng(0))\n        .frame_budget(3)\n        .with_stream(MockStream::new(data));\n\n    // First call: frames 1,2,3 → budget exhausted\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n    // Second call: frames 4,5,6 → budget exhausted\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n    // Third call: frame 7 (FIN) → completed message\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"1234567\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- send_ping / ping timeout ----\n\n#[test]\nfn send_ping_builds_ping_frame() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(MockStream::new(Vec::new()));\n    let deadline = std::time::Instant::now() + std::time::Duration::from_secs(60);\n    assert_eq!(ws.send_ping(deadline).unwrap(), SendStatus::Done);\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_PING);\n    assert!(payload.is_empty());\n}\n\n#[test]\nfn ping_deadline_cleared_on_activity() {\n    let mut data = Vec::new();\n    data.extend(frame(true, OP_TEXT, b\"hi\"));\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(MockStream::new(data));\n    // Set a deadline in the past — would trigger PingTimeout if not cleared.\n    ws.send_ping(std::time::Instant::now() - std::time::Duration::from_secs(1))\n        .unwrap();\n    // Reading a message clears the deadline.\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"hi\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n/// Reads return WouldBlock; writes succeed.\nstruct ReadBlocksMock {\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl Read for ReadBlocksMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n    }\n}\n\nimpl Write for ReadBlocksMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n#[test]\nfn ping_timeout_on_silence() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ReadBlocksMock { tx: Vec::new() });\n    ws.send_ping(std::time::Instant::now() - std::time::Duration::from_secs(1))\n        .unwrap();\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::PingTimeout))\n    ));\n}\n\n#[test]\nfn ping_deadline_not_set_on_retry_later() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(WriteBlockingMock::new(Vec::new()));\n    // First send blocks → Queued. send_ping can't flush pending → RetryLater.\n    assert_eq!(ws.send_text(\"a\").unwrap(), SendStatus::Queued);\n    let deadline = std::time::Instant::now() - std::time::Duration::from_secs(1);\n    assert_eq!(ws.send_ping(deadline).unwrap(), SendStatus::RetryLater);\n    // Deadline not set, so read returns Closed (EOF), not PingTimeout.\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::Closed))\n    ));\n}\n\n// ---- ReadStatus / last_activity ----\n\n#[test]\nfn read_status_message_on_idle_is_none() {\n    let status = ReadStatus::Idle;\n    assert!(status.message().is_none());\n}\n\n#[test]\nfn last_activity_updated_on_message() {\n    let mut ws = ws(frame(true, OP_TEXT, b\"hi\"));\n    assert!(ws.last_activity().is_none());\n    ws.read_message().unwrap();\n    assert!(ws.last_activity().is_some());\n}\n\n#[test]\nfn last_activity_updated_on_budget_exhaustion() {\n    let mut data = Vec::new();\n    data.extend(frame(true, OP_PING, b\"\"));\n    let mut ws = WebSocket::new(CounterRng(0))\n        .frame_budget(1)\n        .with_stream(MockStream::new(data));\n    assert!(ws.last_activity().is_none());\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n    assert!(ws.last_activity().is_some());\n}\n\n#[test]\nfn last_activity_not_updated_on_would_block() {\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ReadBlocksMock { tx: Vec::new() });\n    assert!(ws.last_activity().is_none());\n    assert!(matches!(ws.read_message(), Ok(ReadStatus::Idle)));\n    assert!(ws.last_activity().is_none());\n}\n\n// ---- Rng default next_u32 ----\n\n#[test]\nfn rng_default_next_u32() {\n    struct FillOnly;\n    impl Rng for FillOnly {\n        fn fill_bytes(\u0026mut self, dest: \u0026mut [u8]) {\n            for (i, b) in dest.iter_mut().enumerate() {\n                *b = (i as u8).wrapping_add(1);\n            }\n        }\n    }\n    // Default next_u32 calls fill_bytes with a 4-byte buffer,\n    // then interprets as little-endian.\n    assert_eq!(\n        Rng::next_u32(\u0026mut FillOnly),\n        u32::from_le_bytes([1, 2, 3, 4])\n    );\n}\n\n// ---- Masking alignment ----\n\n#[test]\nfn apply_mask_unaligned() {\n    // Allocate a 32-byte aligned buffer, then offset by 1–3 bytes\n    // to force the head-splitting path in apply_mask.\n    let mask = [0xAA, 0xBB, 0xCC, 0xDD];\n    for misalign in 1..=3 {\n        let mut backing = vec![0u8; 64 + misalign];\n        let buf = \u0026mut backing[misalign..misalign + 48];\n\n        // Fill with a known pattern.\n        for (i, b) in buf.iter_mut().enumerate() {\n            *b = i as u8;\n        }\n        let expected: Vec\u003cu8\u003e = (0..48u8).map(|i| i ^ mask[i as usize % 4]).collect();\n\n        super::apply_mask(buf, mask);\n        assert_eq!(buf, expected.as_slice(), \"misalign={misalign}\");\n    }\n}\n\n// ---- Masking benchmark (not a real benchmark, just a comparison) ----\n\n#[inline(never)]\nfn apply_mask_naive(buf: \u0026mut [u8], mask: [u8; 4]) {\n    for (i, b) in buf.iter_mut().enumerate() {\n        *b ^= mask[i % 4];\n    }\n}\n\n#[inline(never)]\nfn apply_mask_wide(buf: \u0026mut [u8], mask: [u8; 4]) {\n    super::apply_mask(buf, mask);\n}\n\n#[test]\nfn mask_benchmark() {\n    use std::hint::black_box;\n    use std::time::Instant;\n\n    let mask = [0xAA, 0xBB, 0xCC, 0xDD];\n    #[cfg(debug_assertions)]\n    let iterations = 500;\n    #[cfg(not(debug_assertions))]\n    let iterations = 10000;\n\n    eprintln!(\"iterations: {iterations}\");\n\n    for \u0026size in \u0026[15, 16, 17, 32, 64, 1024, 16 * 1024, 256 * 1024] {\n        let data: Vec\u003cu8\u003e = (0..size).map(|i| i as u8).collect();\n\n        let mut buf = data.clone();\n        let start = Instant::now();\n        for _ in 0..iterations {\n            apply_mask_naive(black_box(\u0026mut buf), black_box(mask));\n        }\n        let naive = start.elapsed();\n\n        let mut buf = data.clone();\n        let start = Instant::now();\n        for _ in 0..iterations {\n            apply_mask_wide(black_box(\u0026mut buf), black_box(mask));\n        }\n        let wide = start.elapsed();\n\n        let speedup = naive.as_nanos() as f64 / wide.as_nanos() as f64;\n        eprintln!(\"{size:\u003e8} bytes: naive {naive:\u003e10.2?}  wide {wide:\u003e10.2?}  ({speedup:.1}x)\");\n\n        if size == 256 * 1024 {\n            assert!(\n                speedup \u003e= 10.0,\n                \"wide masking should be at least 10x faster at 256KB, got {speedup:.1}x\"\n            );\n        }\n    }\n}\n\n// ---- Bug: stale tail_len after successful tail completion ----\n\n#[test]\nfn fragmented_text_stale_tail_len() {\n    // Bug: push_text_payload doesn't reset tail_len to 0 after\n    // successfully completing a pending multi-byte sequence.\n    //\n    // Fragment 1: [0xC3]         — half of 'ä', stored in tail (tail_len=1)\n    // Fragment 2: [0xA4, A, B, C] — completes 'ä' + \"ABC\", tail_len NOT reset\n    // Fragment 3: [D, E]          — stale tail causes spurious InvalidUtf8\n    //\n    // Expected: \"äABCDE\"\n    let mut data = frame(false, OP_TEXT, \u0026[0xC3]);\n    data.extend(frame(false, OP_CONTINUATION, \u0026[0xA4, b'A', b'B', b'C']));\n    data.extend(frame(true, OP_CONTINUATION, b\"DE\"));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"äABCDE\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n// ---- Bug: only first utf8_chunk examined in main data path ----\n\n#[test]\nfn fragmented_text_mid_fragment_invalid_utf8_detected_immediately() {\n    // Bug: push_text_payload only calls utf8_chunks().next() on the\n    // main data path. An invalid byte followed by valid bytes in a\n    // non-final fragment is misidentified as a potential incomplete\n    // trailing sequence and stashed in the tail instead of erroring.\n    //\n    // Fragment 1: [0xFF, 'A']  — 0xFF is never valid in UTF-8, and\n    //   it's followed by 'A', so it can't be a trailing incomplete\n    //   sequence. Should error immediately.\n    //\n    // With frame_budget(1), only fragment 1 is processed per call.\n    // Correct: first call errors (InvalidUtf8 on fragment 1).\n    // Bug: first call returns Idle (0xFF stashed in tail, 'A' dropped),\n    //   error deferred to fragment 2.\n    let mut data = frame(false, OP_TEXT, \u0026[0xFF, b'A']);\n    data.extend(frame(true, OP_CONTINUATION, b\"B\"));\n    let mut ws = WebSocket::new(CounterRng(0))\n        .frame_budget(1)\n        .with_stream(MockStream::new(data));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidUtf8(_)))\n    ));\n}\n\n// ---- Send + Sync static assertions ----\n\nconst _: () = {\n    fn _assert_send\u003cT: Send\u003e() {}\n    fn _assert_sync\u003cT: Sync\u003e() {}\n    fn _assertions() {\n        _assert_send::\u003cError\u003e();\n        _assert_sync::\u003cError\u003e();\n        _assert_send::\u003cConnError\u003e();\n        _assert_sync::\u003cConnError\u003e();\n        _assert_send::\u003cCallerError\u003e();\n        _assert_sync::\u003cCallerError\u003e();\n    }\n};\n\n#[test]\nfn compact_read_buf() {\n    let mut buf = ReadBuf::with_capacity(10);\n    let mut cursor = Cursor::new(b\"aaaaabbbbbcccccddddd\".to_vec());\n    buf.fill_from(\u0026mut cursor, 5).unwrap();\n    buf.compact();\n    assert_eq!(buf.pending(), b\"aaaaabbbbbcccccddddd\");\n    buf.consume(5);\n    buf.fill_from(\u0026mut cursor, 5).unwrap();\n    assert_eq!(buf.pending(), b\"bbbbbcccccddddd\");\n    assert_eq!(buf.start_offset(), 5);\n    assert_eq!(buf.end_offset(), 20);\n    buf.compact();\n    assert_eq!(buf.start_offset(), 0);\n    assert_eq!(buf.end_offset(), 15);\n    buf.consume(5);\n    buf.compact();\n    assert_eq!(buf.start_offset(), 0);\n    assert_eq!(buf.end_offset(), 10);\n    assert_eq!(buf.pending(), b\"cccccddddd\");\n}\n","traces":[],"covered":0,"coverable":0}]};
        var previousData = {"files":[{"path":["/","Users","kon","repos","kamekichi-bot","crates","kamekichi-ws","src","error.rs"],"content":"use std::error::Error as StdError;\nuse std::fmt::Display;\nuse std::io;\nuse std::str::Utf8Error;\n\nuse crate::read_buf::FillError;\nuse crate::send_buf::FlushError;\n\n/// Actionable error from a WebSocket operation.\n#[derive(Debug)]\npub enum Error {\n    /// The connection is dead or protocol-violated.  Might get fixed by reconnecting.\n    Reconnect(ConnectionError),\n    /// Caller error.  Reconnecting will not help.\n    Fatal(CallerError),\n}\n\n/// Connection-level error.  The connection is dead or protocol-violated;\n/// the caller should reconnect.\n#[derive(Debug)]\n#[non_exhaustive]\npub enum ConnectionError {\n    /// I/O error on the underlying stream.\n    Io(io::Error),\n    /// The peer closed the connection (EOF).\n    Closed,\n    /// Response headers exceeded the size limit.\n    HeadersTooLarge,\n    /// Server did not respond with HTTP 101.\n    BadStatus,\n    /// Missing `Sec-WebSocket-Accept` header.\n    MissingAccept,\n    /// Invalid `Sec-WebSocket-Accept` value.\n    BadAccept,\n    /// Non-zero reserved bits in a frame header.\n    BadReservedBits(u8),\n    /// Frame payload exceeds the configured maximum.\n    PayloadTooLarge(u64),\n    /// Continuation frame without a preceding data frame.\n    UnexpectedContinuation,\n    /// Reassembled fragmented message exceeds the configured maximum.\n    FragmentedMessageTooLarge(usize),\n    /// Text frame or close reason is not valid UTF-8.\n    InvalidUtf8(Utf8Error),\n    /// New data frame received while a fragmented message is in progress.\n    DataDuringFragmentation,\n    /// Control frame with FIN bit unset.\n    FragmentedControl,\n    /// Control frame payload exceeds 125 bytes.\n    ControlPayloadTooLarge(usize),\n    /// Close frame payload is 1 byte (must be 0 or \u003e= 2).\n    BadClosePayload,\n    /// Unrecognized frame opcode.\n    UnknownOpcode(u8),\n    /// Extended length field uses more bytes than necessary.\n    NonMinimalLength,\n    /// 64-bit payload length has the most significant bit set.\n    PayloadLengthMsb,\n    /// Missing or invalid `Upgrade: websocket` header.\n    MissingUpgrade,\n    /// Missing or invalid `Connection: Upgrade` header.\n    MissingConnection,\n    /// Close status code is not valid per RFC 6455 section 7.4.\n    InvalidCloseCode(u16),\n    /// Server sent a masked frame (clients must not receive masked frames).\n    MaskedServerFrame,\n    /// Too many frames arrived faster than they could trickle in.\n    Flood,\n    /// Server selected a subprotocol that was not offered by the client,\n    /// or sent `Sec-WebSocket-Protocol` when the client did not request one.\n    InvalidSubprotocol,\n    /// No frame was received before the [`send_ping`](crate::WebSocket::send_ping) deadline.\n    PingTimeout,\n}\n\n/// Caller-side error.  Reconnecting will not help.\n#[derive(Debug)]\n#[non_exhaustive]\npub enum CallerError {\n    /// The connection is closing; no further operations are allowed.\n    Closing,\n    /// A header name, value, host, or path contains a disallowed character.\n    InvalidHeaderValue,\n    /// Close code is not valid for sending (RFC 6455 §7.4).\n    InvalidCloseCode(u16),\n    /// Close reason exceeds 123 bytes.\n    CloseReasonTooLong(usize),\n}\n\n// --- ConnectionError impls ---\n\nimpl ConnectionError {\n    pub(crate) fn is_would_block(\u0026self) -\u003e bool {\n        matches!(\n            self,\n            ConnectionError::Io(e) if matches!(e.kind(), io::ErrorKind::WouldBlock | io::ErrorKind::TimedOut)\n        )\n    }\n}\n\nimpl Display for ConnectionError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            ConnectionError::Io(e) =\u003e write!(f, \"IO: {e}\"),\n            ConnectionError::Closed =\u003e write!(f, \"connection closed\"),\n            ConnectionError::HeadersTooLarge =\u003e write!(f, \"response headers too large\"),\n            ConnectionError::BadStatus =\u003e write!(f, \"expected HTTP 101\"),\n            ConnectionError::MissingAccept =\u003e write!(f, \"missing Sec-WebSocket-Accept\"),\n            ConnectionError::BadAccept =\u003e write!(f, \"invalid Sec-WebSocket-Accept\"),\n            ConnectionError::BadReservedBits(bits) =\u003e write!(f, \"non-zero RSV bits: {bits:#x}\"),\n            ConnectionError::PayloadTooLarge(len) =\u003e {\n                write!(f, \"frame payload too large: {len} bytes\")\n            }\n            ConnectionError::UnexpectedContinuation =\u003e write!(f, \"unexpected continuation frame\"),\n            ConnectionError::FragmentedMessageTooLarge(len) =\u003e {\n                write!(f, \"fragmented message too large: {len} bytes\")\n            }\n            ConnectionError::InvalidUtf8(e) =\u003e {\n                write!(f, \"invalid UTF-8 in text frame at {}\", e.valid_up_to())\n            }\n            ConnectionError::DataDuringFragmentation =\u003e {\n                write!(f, \"new data frame during fragmentation\")\n            }\n            ConnectionError::FragmentedControl =\u003e write!(f, \"fragmented control frame\"),\n            ConnectionError::ControlPayloadTooLarge(len) =\u003e {\n                write!(f, \"control frame payload too large: {len}\")\n            }\n            ConnectionError::BadClosePayload =\u003e {\n                write!(f, \"close frame payload must be 0 or \u003e= 2 bytes\")\n            }\n            ConnectionError::UnknownOpcode(op) =\u003e write!(f, \"unknown opcode: {op}\"),\n            ConnectionError::NonMinimalLength =\u003e write!(f, \"non-minimal payload length encoding\"),\n            ConnectionError::PayloadLengthMsb =\u003e {\n                write!(f, \"64-bit payload length has MSB set (RFC 6455 §5.2)\")\n            }\n            ConnectionError::MissingUpgrade =\u003e write!(f, \"missing or invalid Upgrade header\"),\n            ConnectionError::MissingConnection =\u003e {\n                write!(f, \"missing or invalid Connection header\")\n            }\n            ConnectionError::InvalidCloseCode(code) =\u003e write!(f, \"invalid close code: {code}\"),\n            ConnectionError::MaskedServerFrame =\u003e write!(f, \"server sent a masked frame\"),\n            ConnectionError::Flood =\u003e write!(f, \"frame flood detected\"),\n            ConnectionError::InvalidSubprotocol =\u003e {\n                write!(f, \"server selected an unrequested subprotocol\")\n            }\n            ConnectionError::PingTimeout =\u003e write!(f, \"ping timeout: no response by deadline\"),\n        }\n    }\n}\n\nimpl StdError for ConnectionError {\n    fn source(\u0026self) -\u003e Option\u003c\u0026(dyn StdError + 'static)\u003e {\n        match self {\n            ConnectionError::Io(e) =\u003e Some(e),\n            ConnectionError::InvalidUtf8(e) =\u003e Some(e),\n            _ =\u003e None,\n        }\n    }\n}\n\nimpl From\u003cFlushError\u003e for ConnectionError {\n    fn from(e: FlushError) -\u003e Self {\n        match e {\n            FlushError::WriteClosed =\u003e ConnectionError::Closed,\n            FlushError::Io(e) =\u003e ConnectionError::Io(e),\n        }\n    }\n}\n\nimpl From\u003cFillError\u003e for ConnectionError {\n    fn from(e: FillError) -\u003e Self {\n        match e {\n            FillError::Eof =\u003e ConnectionError::Closed,\n            FillError::Io(e) =\u003e ConnectionError::Io(e),\n            FillError::WouldBlock =\u003e {\n                ConnectionError::Io(io::Error::from(io::ErrorKind::WouldBlock))\n            }\n        }\n    }\n}\n\nimpl From\u003cio::Error\u003e for ConnectionError {\n    fn from(e: io::Error) -\u003e Self {\n        ConnectionError::Io(e)\n    }\n}\n\nimpl From\u003cUtf8Error\u003e for ConnectionError {\n    fn from(e: Utf8Error) -\u003e Self {\n        ConnectionError::InvalidUtf8(e)\n    }\n}\n\n// --- CallerError impls ---\n\nimpl Display for CallerError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            CallerError::Closing =\u003e write!(f, \"connection is closing\"),\n            CallerError::InvalidHeaderValue =\u003e write!(f, \"invalid character in header value\"),\n            CallerError::InvalidCloseCode(code) =\u003e write!(f, \"invalid close code: {code}\"),\n            CallerError::CloseReasonTooLong(len) =\u003e {\n                write!(f, \"close reason too long: {len} bytes (max 123)\")\n            }\n        }\n    }\n}\n\nimpl StdError for CallerError {}\n\n// --- Error impls ---\n\nimpl Display for Error {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Error::Reconnect(e) =\u003e write!(f, \"connection error: {e}\"),\n            Error::Fatal(e) =\u003e write!(f, \"caller error: {e}\"),\n        }\n    }\n}\n\nimpl StdError for Error {\n    fn source(\u0026self) -\u003e Option\u003c\u0026(dyn StdError + 'static)\u003e {\n        match self {\n            Error::Reconnect(e) =\u003e Some(e),\n            Error::Fatal(e) =\u003e Some(e),\n        }\n    }\n}\n\nimpl From\u003cFlushError\u003e for Error {\n    fn from(e: FlushError) -\u003e Self {\n        Error::Reconnect(e.into())\n    }\n}\n\nimpl From\u003cConnectionError\u003e for Error {\n    fn from(e: ConnectionError) -\u003e Self {\n        Error::Reconnect(e)\n    }\n}\n\nimpl From\u003cCallerError\u003e for Error {\n    fn from(e: CallerError) -\u003e Self {\n        Error::Fatal(e)\n    }\n}\n","traces":[{"line":93,"address":[],"length":0,"stats":{"Line":32}},{"line":94,"address":[],"length":0,"stats":{"Line":3}},{"line":95,"address":[],"length":0,"stats":{"Line":5}},{"line":96,"address":[],"length":0,"stats":{"Line":12}},{"line":102,"address":[],"length":0,"stats":{"Line":26}},{"line":103,"ad },{"line":163,"address":[],"length":0,"stats":{"Line":6}},{"line":164,"address":[],"length":0,"stats":{"Line":2}},{"line":165,"address":[],"length":0,"stats":{"Line":8}},{"line":171,"address":[],"length":0,"stats":{"Line":7}},{"line":172,"address":[],"length":0,"stats":{"Line":7}},{"line":173,"address":[],"length":0,"stats":{"Line":3}},{"line":174,"address":[],"length":0,"stats":{"Line":2}},{"line":176,"address":[],"length":0,"stats":{"Line":3}},{"line":183,"address":[],"length":0,"stats":{"Line":1}},{"line":184,"address":[],"length":0,"stats":{"Line":1}},{"line":189,"address":[],"length":0,"stats":{"Line":2}},{"line":190,"address":[],"length":0,"stats":{"Line":2}},{"line":197,"address":[],"length":0,"stats":{"Line":5}},{"line":198,"address":[],"length":0,"stats":{"Line":5}},{"line":199,"address":[],"length":0,"stats":{"Line":4}},{"line":200,"address":[],"length":0,"stats":{"Line":2}},{"line":201,"address":[],"length":0,"stats":{"Line":3}},{"line":202,"address":[],"length":0,"stats":{"Line":1}},{"line":203,"address":[],"length":0,"stats":{"Line":2}},{"line":214,"address":[],"length":0,"stats":{"Line":2}},{"line":215,"address":[],"length":0,"stats":{"Line":2}},{"line":216,"address":[],"length":0,"stats":{"Line":3}},{"line":217,"address":[],"length":0,"stats":{"Line":3}},{"line":223,"address":[],"length":0,"stats":{"Line":2}},{"line":224,"address":[],"length":0,"stats":{"Line":2}},{"line":225,"address":[],"length":0,"stats":{"Line":2}},{"line":226,"address":[],"length":0,"stats":{"Line":2}},{"line":232,"address":[],"length":0,"stats":{"Line":5}},{"line":233,"address":[],"length":0,"stats":{"Line":5}},{"line":238,"address":[],"length":0,"stats":{"Line":44}},{"line":239,"address":[],"length":0,"stats":{"Line":44}},{"line":244,"address":[],"length":0,"stats":{"Line":15}},{"line":245,"address":[],"length":0,"stats":{"Line":15}}],"covered":74,"coverable":74},{"path":["/","Users","kon","repos","kamekichi-bot","crates","kamekichi-ws","src","lib.rs"],"content":"#![forbid(unsafe_code)]\n#![warn(missing_docs)]\n//! A lightweight, low-level WebSocket (RFC 6455) client library.\n//!\n//! Works with any stream implementing [`std::io::Read`] + [`std::io::Write`]\n//! — blocking, non-blocking, TCP, or TLS. No async runtime needed.\n//!\n//! # Connection lifecycle\n//!\n//! 1. **Create** — [`WebSocket::new`] allocates buffers (no I/O).\n//!    Chain [`max_payload`](WebSocket::max_payload) /\n//!    [`max_buf_size`](WebSocket::max_buf_size) to configure limits.\n//!    // TODO: ↑ are this all?\n//! 2. **Connect** — [`connect`](WebSocket::connect) (or\n//!    [`try_connect`](WebSocket::try_connect)) performs the HTTP upgrade\n//!    handshake.  Pass extra headers with\n//!    [`connect_with_headers`](WebSocket::connect_with_headers).\n//!    // TODO: ↑ is this all? What about subprotocols? Should it be mentioned that the stream is handed in here?\n//! 3. **Message loop** — [`read_message`](WebSocket::read_message)\n//!    returns [`ReadStatus`]: either a [`Message`] or\n//!    [`Idle`](ReadStatus::Idle).  Check\n//!    [`last_activity`](WebSocket::last_activity) for connection health.\n//!    Send with [`send_text`](WebSocket::send_text) /\n//!    [`send_binary`](WebSocket::send_binary).\n//! 4. **Close** — [`send_close`](WebSocket::send_close), then keep\n//!    calling [`read_message`](WebSocket::read_message) until\n//!    [`Message::Close`] arrives.\n//! 5. **Reuse** — [`disconnect`](WebSocket::disconnect) returns the\n//!    streamless `WebSocket` and the stream separately; the `WebSocket`\n//!    can be reconnected without reallocating.\n//!    // TODO: check that the closing and disconnecting logic is sound\n\nmod error;\nmod proto;\nmod read_buf;\nmod rng;\nmod send_buf;\n\n#[cfg(test)]\nmod tests;\n\nuse std::io::{self, Read, Write};\nuse std::time::Instant;\n\npub use error::{CallerError, ConnectionError, Error};\nuse proto::*;\npub use rng::Rng;\n\n// TODO: these should be in proto.rs?\n/// Default maximum payload size: 16 MiB.\npub(crate) const DEFAULT_MAX_PAYLOAD: usize = 16 * 1024 * 1024;\n/// Default target buffer capacity: 1 MiB.\n/// This can be momentarily exceeded while reading a large payload,\n/// but will be reclaimed later.\npub(crate) const DEFAULT_MAX_BUF_SIZE: usize = 1024 * 1024;\n\n/// Outcome of a send operation.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum SendStatus {\n    /// Frame fully written to the stream. // TODO: no quarantees about flushing, right?\n    Done,\n    /// Frame is queued in the `WebSocket`s own send buffer but not yet (fully) written.\n    /// Call [`WebSocket::flush`] to finish sending.\n    Queued,\n    /// A previously queued frame is still draining (// TODO: draining? try to be consistent with the vocabulary) and the new frame was\n    /// **not** built.  Call [`WebSocket::flush`] to finish the pending\n    /// write, then retry the send.\n    RetryLater,\n}\n\n/// A complete WebSocket message, borrowing from the WebSocket's\n/// internal buffers.\n#[derive(Debug)]\npub enum Message\u003c'a\u003e {\n    /// A UTF-8 text message.\n    Text(\u0026'a str),\n    /// A binary message.\n    Binary(\u0026'a [u8]),\n    /// A close frame with optional status code and reason. // TODO: Option? What about status code 1005\n    Close(Option\u003cu16\u003e, \u0026'a str),\n}\n\n/// Result of [`WebSocket::read_message`].\n#[derive(Debug)]\npub enum ReadStatus\u003c'a\u003e {\n    /// A complete message was read.\n    Message(Message\u003c'a\u003e),\n    /// No complete message is available.\n    ///\n    /// This covers non-blocking `WouldBlock`, read timeouts, and\n    /// frame budget exhaustion.  Use\n    /// [`last_activity`](WebSocket::last_activity) to tell whether\n    /// the connection is alive: if recent, frames are flowing but no\n    /// complete message was produced yet; if stale or `None`, the\n    /// wire has been silent and a liveness probe (ping) may be warranted.\n    Idle,\n}\n\nimpl\u003c'a\u003e ReadStatus\u003c'a\u003e {\n    /// Returns the contained message, or `None` if idle.\n    pub fn message(self) -\u003e Option\u003cMessage\u003c'a\u003e\u003e {\n        match self {\n            ReadStatus::Message(m) =\u003e Some(m),\n            ReadStatus::Idle =\u003e None,\n        }\n    }\n}\n\n/// A WebSocket client over an arbitrary byte stream.\npub struct WebSocket\u003cS, R\u003e {\n    pub(crate) stream: S,\n    /// I/O buffers.  Split from `sess` so that `read_message` can\n    /// return a [`Message`] borrowing from here while `sess` remains\n    /// free to mutate.\n    pub(crate) bufs: Buffers,\n    /// Protocol state (never borrowed by a returned [`Message`]).\n    pub(crate) sess: Session,\n    pub(crate) rng: R,\n}\n\nimpl\u003cS: Read + Write, R: Rng\u003e WebSocket\u003cS, R\u003e {\n    /// Read the next complete WebSocket message from the stream.\n    ///\n    /// Frames are read and reassembled per RFC 6455 §5–6.  The returned\n    /// [`Message`] borrows from the WebSocket's internal read buffer —\n    /// no copies or allocations for single-frame messages.\n    ///\n    /// Control frames (ping, pong, close) are handled inline: pings are\n    /// answered with pongs automatically, and close frames echo the status\n    /// code back before returning [`Message::Close`].\n    ///\n    /// Returns [`ReadStatus::Idle`] when no complete message is available.\n    /// Check [`last_activity`](Self::last_activity) to distinguish\n    /// budget exhaustion (recent activity — connection is alive) from\n    /// I/O silence (stale or `None` — consider a\n    /// [`send_ping`](Self::send_ping)).\n    pub fn read_message(\u0026mut self) -\u003e Result\u003cReadStatus\u003c'_\u003e, Error\u003e {\n        if self.sess.close_state == CloseState::Closed {\n            return Err(CallerError::Closing.into());\n        }\n        match read_message(\n            \u0026mut self.bufs,\n            \u0026mut self.stream,\n            \u0026mut self.sess,\n            \u0026mut self.rng,\n        ) {\n            Ok(Some(msg)) =\u003e {\n                let now = Instant::now();\n                self.sess.last_activity = Some(now);\n                self.sess.ping_deadline = None;\n                Ok(ReadStatus::Message(msg))\n            }\n            Ok(None) =\u003e {\n                // Budget exhausted — frames were processed.\n                let now = Instant::now();\n                self.sess.last_activity = Some(now);\n                self.sess.ping_deadline = None;\n                Ok(ReadStatus::Idle)\n            }\n            Err(e) if e.is_would_block() =\u003e {\n                if let Some(deadline) = self.sess.ping_deadline\n                    \u0026\u0026 Instant::now() \u003e= deadline\n                {\n                    self.sess.ping_deadline = None;\n                    self.sess.close_state = CloseState::Closed;\n                    return Err(ConnectionError::PingTimeout.into());\n                }\n                Ok(ReadStatus::Idle)\n            }\n            Err(e) =\u003e {\n                self.sess.close_state = CloseState::Closed;\n                Err(e.into())\n            }\n        }\n    }\n\n    /// Build a frame and flush it to the stream.\n    ///\n    /// If a previous frame is still partially queued, it is flushed first.\n    /// Returns `Ok(RetryLater)` if the previous frame could not be drained\n    /// (the new frame was **not** built — flush and retry).  Returns\n    /// `Ok(Queued)` if the new frame was built but only partially flushed\n    /// — call [`flush`](Self::flush) to finish.\n    fn send_frame(\u0026mut self, opcode: u8, payload: \u0026[u8]) -\u003e Result\u003cSendStatus, Error\u003e {\n        if self.sess.close_state != CloseState::Open {\n            return Err(CallerError::Closing.into());\n        }\n        if self.bufs.send.has_pending() {\n            match self.bufs.send.flush(\u0026mut self.stream) {\n                Ok(()) =\u003e {}\n                Err(e) if e.is_would_block() =\u003e return Ok(SendStatus::RetryLater),\n                Err(e) =\u003e return Err(e.into()),\n            }\n        }\n        self.bufs.send.clear();\n        build_frame(\u0026mut self.bufs.send, \u0026mut self.rng, opcode, payload);\n        match self.bufs.send.flush(\u0026mut self.stream) {\n            Ok(()) =\u003e {\n                // Best-effort transport flush — the frame is already in\n                // the stream's write buffer.  Callers who need delivery\n                // confirmation should follow up with [`flush`](Self::flush),\n                // which propagates stream.flush() errors.\n                let _ = self.stream.flush();\n                self.bufs\n                    .send\n                    .maybe_shrink(self.sess.max_buf_size, \u0026mut self.rng);\n                Ok(SendStatus::Done)\n            }\n            Err(e) if e.is_would_block() =\u003e Ok(SendStatus::Queued),\n            Err(e) =\u003e Err(e.into()),\n        }\n    }\n\n    // TODO: this is a bad name, as it conflates \"flush\" (underlying stream flush) with \"write\"\n    /// Flush any queued send data to the stream.\n    ///\n    /// Call this after a send method returns [`SendStatus::Queued`] or\n    /// [`SendStatus::RetryLater`] to finish writing.\n    pub fn flush(\u0026mut self) -\u003e Result\u003cSendStatus, Error\u003e {\n        if self.bufs.send.has_pending() {\n            match self.bufs.send.flush(\u0026mut self.stream) {\n                Ok(()) =\u003e {\n                    self.bufs\n                        .send\n                        .maybe_shrink(self.sess.max_buf_size, \u0026mut self.rng);\n                }\n                Err(e) if e.is_would_block() =\u003e return Ok(SendStatus::Queued),\n                Err(e) =\u003e return Err(e.into()),\n            }\n        }\n        match self.stream.flush() {\n            Ok(()) =\u003e Ok(SendStatus::Done),\n            Err(e)\n                if matches!(\n                    e.kind(),\n                    io::ErrorKind::WouldBlock | io::ErrorKind::TimedOut\n                ) =\u003e\n            {\n                Ok(SendStatus::Queued)\n            }\n            Err(e) =\u003e Err(ConnectionError::Io(e).into()),\n        }\n    }\n\n    /// Send a UTF-8 text frame.\n    pub fn send_text(\u0026mut self, text: \u0026str) -\u003e Result\u003cSendStatus, Error\u003e {\n        self.send_frame(OP_TEXT, text.as_bytes())\n    }\n\n    /// Send a binary frame.\n    pub fn send_binary(\u0026mut self, data: \u0026[u8]) -\u003e Result\u003cSendStatus, Error\u003e {\n        self.send_frame(OP_BINARY, data)\n    }\n\n    /// Send a ping frame for liveness detection.\n    ///\n    /// If no frame (pong or otherwise) is received by `deadline`,\n    /// the next [`read_message`](Self::read_message) call that\n    /// observes silence will return\n    /// [`ConnectionError::PingTimeout`].\n    /// Any received frame clears the deadline — the connection is\n    /// proven alive regardless of whether the frame is a pong.\n    ///\n    /// Only one deadline is active at a time; a second `send_ping`\n    /// replaces the previous deadline.\n    pub fn send_ping(\u0026mut self, deadline: Instant) -\u003e Result\u003cSendStatus, Error\u003e {\n        let r = self.send_frame(OP_PING, \u0026[])?;\n        if r != SendStatus::RetryLater {\n            self.sess.ping_deadline = Some(deadline);\n        }\n        Ok(r)\n    }\n\n    /// Send a close frame with the given status code and reason.\n    ///\n    /// The reason must be at most 123 bytes (RFC 6455 §5.5: control frame\n    /// payloads are limited to 125 bytes, minus 2 for the status code).\n    ///\n    /// The connection enters the `CloseSent` state even if the frame is\n    /// only [`Queued`](SendStatus::Queued) — the close is committed and\n    /// no further data frames may be sent.  Call [`read_message`](Self::read_message)\n    /// to await the server's close response.\n    pub fn send_close(\u0026mut self, code: u16, reason: \u0026str) -\u003e Result\u003cSendStatus, Error\u003e {\n        let (payload, len) = close_payload(code, reason)?;\n        let r = self.send_frame(OP_CLOSE, \u0026payload[..len])?;\n        if r != SendStatus::RetryLater {\n            self.sess.close_state = CloseState::CloseSent;\n        }\n        Ok(r)\n    }\n}\n\nimpl\u003cR: Rng\u003e WebSocket\u003c(), R\u003e {\n    /// Create a new WebSocket with internal buffers but no stream.\n    ///\n    /// Use [`connect`](Self::connect) to perform the opening handshake, or\n    /// [`with_stream`](Self::with_stream) to wrap a pre-upgraded stream.\n    ///\n    /// The provided `rng` generates frame masking keys and drives\n    /// probabilistic buffer shrinking.\n    ///\n    /// RFC 6455 §10.3 requires (MUST) that masking keys be\n    /// unpredictable — this defends against a cache-poisoning attack\n    /// where a broken HTTP proxy inspects bytes inside a CONNECT\n    /// tunnel and an attacker-controlled payload is crafted to look\n    /// like a cacheable HTTP response after XOR with a predicted mask.\n    ///\n    /// **Default recommendation: `ChaCha8Rng`** (from `rand_chacha`).\n    /// Fast, cryptographically strong, and satisfies the RFC\n    /// unconditionally.\n    ///\n    /// A non-cryptographic PRNG such as `Pcg64Mcg` is acceptable when\n    /// **either** of the following holds:\n    /// - the stream is TLS or another strongly encrypted transport\n    ///   (the proxy cannot observe the masked bytes), or\n    /// - all sent content is fully controlled by the developer or the\n    ///   direct user of the code (no attacker-chosen payload reaches\n    ///   the wire).\n    pub fn new(rng: R) -\u003e Self {\n        WebSocket {\n            stream: (),\n            bufs: Buffers::new(),\n            sess: Session::new(),\n            rng,\n        }\n    }\n\n    /// Wrap a pre-upgraded stream for framed messaging without handshaking.\n    ///\n    /// Use this when the WebSocket upgrade was handled externally (e.g. by\n    /// a proxy) or in tests.\n    pub fn with_stream\u003cS\u003e(self, stream: S) -\u003e WebSocket\u003cS, R\u003e {\n        self.replace_stream(stream).1\n    }\n\n    /// Like [`connect`](Self::connect), but returns the `WebSocket` and\n    /// `stream` on failure so the caller can retry without reallocating.\n    ///\n    /// On a [`CallerError`] (e.g. invalid host/path), the stream is\n    /// returned untouched.  On a [`ConnectionError`], the stream may\n    /// have been partially used (HTTP request written) but the\n    /// `WebSocket` is reset to a clean state ready for another\n    /// [`connect`](Self::connect) or\n    /// [`try_connect`](Self::try_connect) call.\n    #[allow(clippy::result_large_err)]\n    pub fn try_connect\u003cS: Read + Write\u003e(\n        self,\n        stream: S,\n        host: \u0026str,\n        path: \u0026str,\n    ) -\u003e Result\u003cWebSocket\u003cS, R\u003e, (Error, Self, S)\u003e {\n        self.try_connect_with_headers(stream, host, path, \u0026[])\n    }\n\n    /// Like [`try_connect`](Self::try_connect), but sends additional\n    /// HTTP headers during the opening handshake.\n    ///\n    /// Each `(name, value)` pair is written as a header line after the\n    /// standard WebSocket headers.  Both name and value are validated\n    /// to reject CR/LF (preventing header injection).\n    ///\n    /// ```rust,ignore\n    /// let ws = WebSocket::new(rng)\n    ///     .try_connect_with_headers(stream, \"example.com\", \"/ws\", \u0026[\n    ///         (\"Authorization\", \"Bearer tok_xxx\"),\n    ///         (\"Origin\", \"https://example.com\"),\n    ///     ])?;\n    /// ```\n    #[allow(clippy::result_large_err)]\n    pub fn try_connect_with_headers\u003cS: Read + Write\u003e(\n        self,\n        stream: S,\n        host: \u0026str,\n        path: \u0026str,\n        headers: \u0026[(\u0026str, \u0026str)],\n    ) -\u003e Result\u003cWebSocket\u003cS, R\u003e, (Error, Self,
