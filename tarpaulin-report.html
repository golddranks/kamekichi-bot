ilError};\nuse crate::rng::Rng;\nuse crate::send_buf::SendBuf;\nuse crate::{Message, WebSocket};\n\npub(crate) const WS_GUID: \u0026str = \"258EAFA5-E914-47DA-95CA-C5AB0DC85B11\";\nconst MAX_HEADER: usize = 8192;\n/// Maximum wire size of a single control frame (2-byte header + 125-byte\n/// payload).  Reads of this size or smaller indicate that data arrived\n/// slowly and count as \"trickle\" for flood detection.  Also used as the\n/// divisor for message-completion flood relief.\nconst SMALL_READ_THRESHOLD: usize = 127;\n\n// Frame header bits (RFC 6455 §5.2)\npub(crate) const FIN: u8 = 0b1000_0000;\npub(crate) const RESERVED_MASK: u8 = 0b0111_0000;\npub(crate) const OPCODE_MASK: u8 = 0b0000_1111;\npub(crate) const MASK_BIT: u8 = 0b1000_0000;\npub(crate) const LEN_MASK: u8 = 0b0111_1111;\n\n// Opcodes (RFC 6455 §5.2)\npub(crate) const OP_CONTINUATION: u8 = 0x0;\npub(crate) const OP_TEXT: u8 = 0x1;\npub(crate) const OP_BINARY: u8 = 0x2;\npub(crate) const OP_CLOSE: u8 = 0x8;\npub(crate) const OP_PING: u8 = 0x9;\npub(crate) const OP_PONG: u8 = 0xA;\n\n/// Close handshake state (RFC 6455 §7.1).\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub(crate) enum CloseState {\n    /// Connection is open — reads and writes allowed.\n    Open,\n    /// We sent a close frame.  Writes are blocked; reads continue\n    /// until the server's close response arrives.\n    CloseSent,\n    /// Close handshake complete (both sides).  No further I/O.\n    Closed,\n}\n\n/// I/O buffers.  Separated from [`Session`] so that `read_message` can\n/// lend the returned [`Message`] from these buffers while [`Session`]\n/// remains free to mutate (e.g. poisoning `close_state` on error).\npub(crate) struct Buffers {\n    /// Incoming byte buffer.  Non-fragmented messages are borrowed\n    /// directly from here, avoiding copies.\n    pub(crate) read: ReadBuf,\n    /// Outgoing byte buffer; partially-flushed frames are retried on\n    /// the next flush.\n    pub(crate) send: SendBuf,\n    /// Reassembly buffer for fragmented BINARY messages.\n    pub(crate) fragment_bin: Vec\u003cu8\u003e,\n    /// Reassembly buffer for fragmented TEXT messages.\n    pub(crate) fragment_text: String,\n    /// Incomplete UTF-8 tail bytes from the last TEXT fragment (1–3 bytes).\n    utf8_tail: [u8; 3],\n    utf8_tail_len: u8,\n}\n\n/// Protocol state that is never borrowed by a returned [`Message`].\npub(crate) struct Session {\n    /// Opcode of the first frame in a fragmented message (0 = no active fragmentation).\n    pub(crate) fragment_opcode: u8,\n    pub(crate) close_state: CloseState,\n    /// Maximum payload size (bytes) accepted for a single frame or\n    /// reassembled fragmented message.\n    pub(crate) max_payload: usize,\n    /// Target buffer capacity. After processing a large message the read\n    /// buffer is shrunk back to this size to avoid permanent memory bloat.\n    pub(crate) max_buf_size: usize,\n    /// Max frames processed per [`read_message`] call without producing\n    /// a message before returning [`ReadStatus::Idle`].  `usize::MAX` = unlimited.\n    pub(crate) frame_budget: usize,\n    /// Running score for flood detection.  Incremented per frame,\n    /// decremented per small read and per completed message.\n    pub(crate) flood_score: usize,\n    /// Threshold above which [`flood_score`] triggers an error.\n    pub(crate) max_flood_score: usize,\n    /// Comma-joined subprotocol tokens to send in `Sec-WebSocket-Protocol`.\n    /// `None` means no subprotocol negotiation.\n    pub(crate) subprotocols: Option\u003cString\u003e,\n    /// The subprotocol selected by the server during the handshake.\n    pub(crate) negotiated_subprotocol: Option\u003cString\u003e,\n    /// Deadline by which a pong (or any frame) must arrive after a\n    /// [`send_ping`](WebSocket::send_ping).  Cleared when any frame\n    /// is received; triggers [`ConnError::PingTimeout`] if\n    /// exceeded during an idle [`read_message`] call.\n    pub(crate) ping_deadline: Option\u003cInstant\u003e,\n    /// When the last frame was received.  Updated on every\n    /// [`read_message`](WebSocket::read_message) call that processed\n    /// at least one frame.\n    pub(crate) last_activity: Option\u003cInstant\u003e,\n}\n\nimpl Buffers {\n    pub(crate) fn new() -\u003e Self {\n        Buffers {\n            read: ReadBuf::with_capacity(MAX_HEADER),\n            send: SendBuf::with_capacity(256),\n            fragment_bin: Vec::new(),\n            fragment_text: String::new(),\n            utf8_tail: [0; 3],\n            utf8_tail_len: 0,\n        }\n    }\n\n    pub(crate) fn clear(\u0026mut self) {\n        self.read.clear();\n        self.send.clear();\n        self.fragment_bin.clear();\n        self.fragment_text.clear();\n        self.utf8_tail_len = 0;\n    }\n}\n\npub(crate) fn read_message\u003c'b, S: Read + Write, R: Rng\u003e(\n    bufs: \u0026'b mut Buffers,\n    stream: \u0026mut S,\n    sess: \u0026mut Session,\n    rng: \u0026mut R,\n) -\u003e Result\u003cOption\u003cMessage\u003c'b\u003e\u003e, ConnError\u003e {\n    // If a previous send (e.g. a pong reply) was only partially\n    // written to the stream, finish sending it now.\n    if bufs.send.has_pending() {\n        match bufs.send.flush(stream) {\n            Ok(()) =\u003e {\n                let _ = stream.flush();\n                bufs.send.maybe_shrink(sess.max_buf_size, rng);\n            }\n            // Don't propagate — this is a read call; returning\n            // WouldBlock would make the caller wait for readability\n            // when the real bottleneck is writability.  The bytes\n            // stay in the send buffer and will go out on the next attempt\n            // on a best-effort basis.\n            Err(e) if e.is_would_block() =\u003e {}\n            Err(e) =\u003e return Err(e.into()),\n        }\n    }\n    let mut budget = sess.frame_budget;\n    loop {\n        if bufs.read.maybe_compact(MAX_HEADER) {\n            bufs.read.maybe_shrink_capacity(sess.max_buf_size, rng);\n        }\n        // Shrink fragment reassembly buffers after a large message.\n        // Done here (top of loop) rather than at completion time\n        // because the returned Message borrows from the buffer.\n        if sess.fragment_opcode == 0 \u0026\u0026 rng.one_in_eight_odds() {\n            if bufs.fragment_bin.capacity() \u003e sess.max_buf_size {\n                bufs.fragment_bin.clear();\n                bufs.fragment_bin.shrink_to(sess.max_buf_size);\n            }\n            if bufs.fragment_text.capacity() \u003e sess.max_buf_size {\n                bufs.fragment_text.clear();\n                bufs.fragment_text.shrink_to(sess.max_buf_size);\n            }\n        }\n\n        // Track how many bytes fill_from reads from the OS.\n        let old_end = bufs.read.end_offset();\n\n        // Parse frame header\n        let (fin, opcode, payload_len) = {\n            bufs.read.fill_from(stream, 2)?;\n            let hdr = bufs.read.pending();\n            let byte0 = hdr[0];\n            let byte1 = hdr[1];\n\n            let rsv = byte0 \u0026 RESERVED_MASK;\n            if rsv != 0 {\n                return Err(ConnError::BadReservedBits(rsv));\n            }\n\n            let fin = byte0 \u0026 FIN != 0;\n            let opcode = byte0 \u0026 OPCODE_MASK;\n            let masked = byte1 \u0026 MASK_BIT != 0;\n            if masked {\n                return Err(ConnError::MaskedServerFrame);\n            }\n            let len_byte = (byte1 \u0026 LEN_MASK) as usize;\n\n            let (header_size, payload_len) = match len_byte {\n                n @ 0..=125 =\u003e (2, n),\n                126 =\u003e {\n                    bufs.read.fill_from(stream, 4)?;\n                    let hdr = bufs.read.pending();\n                    let len = u16::from_be_bytes([hdr[2], hdr[3]]) as usize;\n                    if len \u003c 126 {\n                        return Err(ConnError::NonMinimalLength);\n                    }\n                    if len \u003e sess.max_payload {\n                        return Err(ConnError::PayloadTooLarge(len as u64));\n                    }\n                    (4, len)\n                }\n                127 =\u003e {\n                    bufs.read.fill_from(stream, 10)?;\n                    let hdr = bufs.read.pending();\n                    let len = u64::from_be_bytes(hdr[2..10].try_into().unwrap());\n                    if len \u003e\u003e 63 != 0 {\n                        return Err(ConnError::PayloadLengthMsb);\n                    }\n                    if len \u003c 65536 {\n                        return Err(ConnError::NonMinimalLength);\n                    }\n                    if len \u003e sess.max_payload as u64 {\n                        return Err(ConnError::PayloadTooLarge(len));\n                    }\n                    (10, len as usize)\n                }\n                _ =\u003e unreachable!(\"7-bit value is always 0..=127\"),\n            };\n\n            if opcode \u003e= OP_CLOSE {\n                if !fin {\n                    return Err(ConnError::FragmentedControl);\n                }\n                if payload_len \u003e 125 {\n                    return Err(ConnError::ControlPayloadTooLarge(payload_len));\n                }\n            }\n\n            let frame_size = header_size + payload_len;\n            bufs.read.fill_from(stream, frame_size)?;\n            bufs.read.consume(frame_size);\n\n            (fin, opcode, payload_len)\n        };\n\n        // A small read means data trickled in (one frame); a big\n        // read (or no read at all) means data was already buffered.\n        let bytes_read = bufs.read.end_offset() - old_end;\n        if bytes_read \u003e 0 \u0026\u0026 bytes_read \u003c= SMALL_READ_THRESHOLD {\n            sess.flood_score = sess.flood_score.saturating_sub(1);\n        }\n\n        // Flood detection: every frame adds pressure.\n        sess.flood_score += 1;\n        if sess.flood_score \u003e sess.max_flood_score {\n            return Err(ConnError::Flood);\n        }\n\n        let pos = bufs.read.start_offset();\n        let payload_range = pos - payload_len..pos;\n\n        match opcode {\n            OP_CONTINUATION =\u003e {\n                if sess.fragment_opcode == 0 {\n                    return Err(ConnError::UnexpectedContinuation);\n                }\n                let payload = bufs.read.slice(payload_range);\n                if sess.fragment_opcode == OP_TEXT {\n                    let total =\n                        bufs.fragment_text.len() + bufs.utf8_tail_len as usize + payload_len;\n                    if total \u003e sess.max_payload {\n                        return Err(ConnError::FragmentedMessageTooLarge(total));\n                    }\n                    push_text_payload(\n                        \u0026mut bufs.fragment_text,\n                        \u0026mut bufs.utf8_tail,\n                        \u0026mut bufs.utf8_tail_len,\n                        payload,\n                        fin,\n                    )?;\n                    if fin {\n                        sess.fragment_opcode = 0;\n                        let relief = 1.max(bufs.fragment_text.len() / SMALL_READ_THRESHOLD);\n                        sess.flood_score = sess.flood_score.saturating_sub(relief);\n                        return Ok(Some(Message::Text(\u0026bufs.fragment_text)));\n                    }\n                } else if sess.fragment_opcode == OP_BINARY {\n                    let total = bufs.fragment_bin.len() + payload_len;\n                    if total \u003e sess.max_payload {\n                        return Err(ConnError::FragmentedMessageTooLarge(total));\n                    }\n                    bufs.fragment_bin.extend_from_slice(payload);\n                    if fin {\n                        sess.fragment_opcode = 0;\n                        let relief = 1.max(bufs.fragment_bin.len() / SMALL_READ_THRESHOLD);\n                        sess.flood_score = sess.flood_score.saturating_sub(relief);\n                        return Ok(Some(Message::Binary(\u0026bufs.fragment_bin)));\n                    }\n                } else {\n                    unreachable!(\"fragment_opcode is only set to OP_TEXT or OP_BINARY\")\n                }\n            }\n\n            OP_TEXT | OP_BINARY =\u003e {\n                if sess.fragment_opcode != 0 {\n                    return Err(ConnError::DataDuringFragmentation);\n                }\n                if fin {\n                    let relief = 1.max(payload_len / SMALL_READ_THRESHOLD);\n                    sess.flood_score = sess.flood_score.saturating_sub(relief);\n                    let buf = bufs.read.slice(payload_range);\n                    return Ok(Some(match opcode {\n                        OP_TEXT =\u003e Message::Text(std::str::from_utf8(buf)?),\n                        _ =\u003e Message::Binary(buf),\n                    }));\n                }\n                // Start fragmented message.\n                let payload = bufs.read.slice(payload_range);\n                if opcode == OP_TEXT {\n                    bufs.fragment_text.clear();\n                    bufs.utf8_tail_len = 0;\n                    push_text_payload(\n                        \u0026mut bufs.fragment_text,\n                        \u0026mut bufs.utf8_tail,\n                        \u0026mut bufs.utf8_tail_len,\n                        payload,\n                        false,\n                    )?;\n                } else {\n                    bufs.fragment_bin.clear();\n                    bufs.fragment_bin.extend_from_slice(payload);\n                }\n                sess.fragment_opcode = opcode;\n            }\n\n            OP_CLOSE =\u003e {\n                let echo = sess.close_state == CloseState::Open;\n                sess.close_state = CloseState::Closed;\n                return handle_close(\n                    stream,\n                    \u0026mut bufs.send,\n                    rng,\n                    bufs.read.slice(payload_range),\n                    echo,\n                )\n                .map(Some);\n            }\n\n            // Pong replies are sent even during CloseSent:\n            // control frames are not data frames, and most\n            // peers expect pong responses until the TCP\n            // connection is torn down.\n            OP_PING =\u003e {\n                if bufs.send.pending_len() \u003c sess.max_buf_size {\n                    build_frame(\u0026mut bufs.send, rng, OP_PONG, bufs.read.slice(payload_range));\n                }\n                bufs.send.try_flush(stream);\n            }\n\n            OP_PONG =\u003e {}\n\n            _ =\u003e return Err(ConnError::UnknownOpcode(opcode)),\n        }\n\n        // Budget: yield to the caller after processing too many\n        // frames without producing a message.\n        budget = budget.saturating_sub(1);\n        if budget == 0 {\n            return Ok(None);\n        }\n    }\n}\n\nimpl Session {\n    pub(crate) fn new() -\u003e Self {\n        Session {\n            fragment_opcode: 0,\n            close_state: CloseState::Open,\n            max_payload: crate::DEFAULT_MAX_PAYLOAD,\n            max_buf_size: crate::DEFAULT_MAX_BUF_SIZE,\n            frame_budget: usize::MAX,\n            flood_score: 0,\n            max_flood_score: 1000,\n            subprotocols: None,\n            negotiated_subprotocol: None,\n            ping_deadline: None,\n            last_activity: None,\n        }\n    }\n\n    /// Reset runtime state for a new connection, preserving configuration.\n    pub(crate) fn reset(\u0026mut self) {\n        self.fragment_opcode = 0;\n        self.close_state = CloseState::Open;\n        self.flood_score = 0;\n        self.negotiated_subprotocol = None;\n        self.ping_deadline = None;\n        self.last_activity = None;\n    }\n}\n\nimpl\u003cS: Read + Write, R: Rng\u003e WebSocket\u003cS, R\u003e {\n    /// Run the WebSocket opening handshake on the underlying stream.\n    pub(crate) fn handshake(\n        \u0026mut self,\n        host: \u0026str,\n        path: \u0026str,\n        headers: \u0026[(\u0026str, \u0026str)],\n    ) -\u003e Result\u003c(), ConnError\u003e {\n        self.bufs.clear();\n        self.sess.reset();\n        let mut line_ends = [0usize; 64];\n        let mut n_lines = 0;\n\n        let key = {\n            let mut raw = [0u8; 16];\n            self.rng.fill_bytes(\u0026mut raw);\n            let mut encoded = [0u8; 24];\n            base64::engine::general_purpose::STANDARD\n                .encode_slice(raw, \u0026mut encoded)\n                .expect(\"24-byte buffer fits 16 bytes of base64\");\n            encoded\n        };\n\n        {\n            let key = std::str::from_utf8(\u0026key).expect(\"base64 output is ASCII\");\n            let buf = self.bufs.send.as_scratch();\n            use std::io::Write as _;\n            write!(\n                buf,\n                \"GET {path} HTTP/1.1\\r\\n\\\n                 Host: {host}\\r\\n\\\n                 Upgrade: websocket\\r\\n\\\n                 Connection: Upgrade\\r\\n\\\n                 Sec-WebSocket-Key: {key}\\r\\n\\\n                 Sec-WebSocket-Version: 13\\r\\n\"\n            )\n            .expect(\"write to Vec cannot fail\");\n            if let Some(ref protos) = self.sess.subprotocols {\n                write!(buf, \"Sec-WebSocket-Protocol: {protos}\\r\\n\")\n                    .expect(\"write to Vec cannot fail\");\n            }\n            for \u0026(name, value) in headers {\n                write!(buf, \"{name}: {value}\\r\\n\").expect(\"write to Vec cannot fail\");\n            }\n            buf.extend_from_slice(b\"\\r\\n\");\n            self.stream.write_all(buf)?;\n            self.bufs.send.clear();\n            self.stream.flush()?;\n        }\n\n        let header_end = {\n            let mut scan = 0;\n            let mut prev_nl: Option\u003cusize\u003e = None;\n            let n_lines = \u0026mut n_lines;\n            self.bufs\n                .read\n                .read_until::\u003c_, ConnError\u003e(\u0026mut self.stream, MAX_HEADER, |buf| {\n                    let data = buf.pending();\n                    let limit = data.len().min(MAX_HEADER);\n                    while let Some(off) = data[scan..limit].iter().position(|\u0026b| b == b'\\n') {\n                        let nl = scan + off;\n                        if *n_lines \u003e= line_ends.len() {\n                            return Err(ConnError::HeadersTooLarge);\n                        }\n                        line_ends[*n_lines] = nl;\n                        *n_lines += 1;\n                        if let Some(prev) = prev_nl {\n                            let gap = nl - prev;\n                            if gap == 1 || (gap == 2 \u0026\u0026 data[nl - 1] == b'\\r') {\n                                return Ok(Some(nl + 1));\n                            }\n                        }\n                        prev_nl = Some(nl);\n                        scan = nl + 1;\n                    }\n                    if data.len() \u003e= MAX_HEADER {\n                        return Err(ConnError::HeadersTooLarge);\n                    }\n                    Ok(None)\n                })\n                .map_err(|e| match e {\n                    ReadUntilError::Eof =\u003e ConnError::Closed,\n                    ReadUntilError::Io(e) =\u003e ConnError::Io(e),\n                    ReadUntilError::WouldBlock =\u003e {\n                        ConnError::Io(io::Error::from(io::ErrorKind::WouldBlock))\n                    }\n                    // The callback already checks data.len() \u003e= MAX_HEADER,\n                    // so it always returns HeadersTooLarge before the byte\n                    // limit fires.\n                    ReadUntilError::LimitReached =\u003e {\n                        unreachable!(\"should have returned HeadersTooLarge\")\n                    }\n                    ReadUntilError::CallbackError(e) =\u003e e,\n                })?\n        };\n\n        {\n            let status = b\"HTTP/1.1 101\";\n            let data = self.bufs.read.pending();\n            if !(data[..header_end].starts_with(status)\n                \u0026\u0026 matches!(data[status.len()], b' ' | b'\\r' | b'\\n'))\n            {\n                return Err(ConnError::BadStatus);\n            }\n        }\n\n        {\n            let mut ctx = ring::digest::Context::new(\u0026ring::digest::SHA1_FOR_LEGACY_USE_ONLY);\n            ctx.update(\u0026key);\n            ctx.update(WS_GUID.as_bytes());\n            let mut expected = [0u8; 28];\n            base64::engine::general_purpose::STANDARD\n                .encode_slice(ctx.finish().as_ref(), \u0026mut expected)\n                .expect(\"28-byte buffer fits 20 bytes of base64\");\n\n            let mut accept = None;\n            let mut has_upgrade = false;\n            let mut has_connection = false;\n            let mut subprotocol = None;\n            let mut line_start = 0;\n            let data = self.bufs.read.pending();\n            for \u0026nl in \u0026line_ends[..n_lines] {\n                let line = \u0026data[line_start..nl];\n                let line = line.strip_suffix(b\"\\r\").unwrap_or(line);\n                if let Some(colon) = line.iter().position(|\u0026b| b == b':') {\n                    let name = \u0026line[..colon];\n                    let value = line[colon + 1..].trim_ascii();\n                    if name.eq_ignore_ascii_case(b\"sec-websocket-accept\") {\n                        accept = accept.or(Some(value));\n                    } else if name.eq_ignore_ascii_case(b\"upgrade\") {\n                        has_upgrade |= value\n                            .split(|\u0026b| b == b',')\n                            .any(|t| t.trim_ascii().eq_ignore_ascii_case(b\"websocket\"));\n                    } else if name.eq_ignore_ascii_case(b\"connection\") {\n                        has_connection |= value\n                            .split(|\u0026b| b == b',')\n                            .any(|t| t.trim_ascii().eq_ignore_ascii_case(b\"upgrade\"));\n                    } else if name.eq_ignore_ascii_case(b\"sec-websocket-protocol\") {\n                        subprotocol = subprotocol.or(Some(value));\n                    }\n                }\n                line_start = nl + 1;\n            }\n\n            let accept = accept.ok_or(ConnError::MissingAccept)?;\n            if accept != expected {\n                return Err(ConnError::BadAccept);\n            }\n            if !has_upgrade {\n                return Err(ConnError::MissingUpgrade);\n            }\n            if !has_connection {\n                return Err(ConnError::MissingConnection);\n            }\n\n            // RFC 6455 §4.2.2: if the server sends Sec-WebSocket-Protocol,\n            // it must be one of the values the client offered.\n            if let Some(selected) = subprotocol {\n                let selected = std::str::from_utf8(selected)?;\n                match self.sess.subprotocols {\n                    Some(ref offered) =\u003e {\n                        if !offered.split(',').any(|t| t.trim() == selected) {\n                            return Err(ConnError::InvalidSubprotocol);\n                        }\n                        self.sess.negotiated_subprotocol = Some(selected.to_owned());\n                    }\n                    None =\u003e return Err(ConnError::InvalidSubprotocol),\n                }\n            }\n        }\n\n        self.bufs.read.consume(header_end);\n        self.bufs.read.compact();\n\n        Ok(())\n    }\n}\n\n/// Append a masked WebSocket frame to the send buffer.\npub(crate) fn build_frame(send: \u0026mut SendBuf, rng: \u0026mut impl Rng, opcode: u8, payload: \u0026[u8]) {\n    send.reserve(2 + 8 + 4 + payload.len());\n    send.push_byte(FIN | opcode);\n\n    let len = payload.len();\n    if len \u003c 126 {\n        send.push_byte(MASK_BIT | len as u8);\n    } else if len \u003c 65536 {\n        send.push_byte(MASK_BIT | 126);\n        send.push(\u0026(len as u16).to_be_bytes());\n    } else {\n        send.push_byte(MASK_BIT | 127);\n        send.push(\u0026(len as u64).to_be_bytes());\n    }\n    let mask = rng.next_u32().to_ne_bytes();\n    send.push(\u0026mask);\n    send.push(payload);\n\n    apply_mask(send.last_mut(payload.len()), mask);\n}\n\n/// XOR `buf` with `mask` repeated.  Aligns to a 16-byte boundary,\n/// then uses u128-wide XOR for the bulk.\npub(crate) fn apply_mask(buf: \u0026mut [u8], mask: [u8; 4]) {\n    // Split off unaligned head bytes.\n    let align = buf.as_ptr().align_offset(align_of::\u003cu128\u003e()).min(buf.len());\n    let (head, rest) = buf.split_at_mut(align);\n    for (i, b) in head.iter_mut().enumerate() {\n        *b ^= mask[i % 4];\n    }\n\n    // Build the wide mask, rotated by the head length so mask bytes\n    // stay in sync across the split.\n    let rot = (align % 4) as u32 * 8;\n    let m = u32::from_ne_bytes(mask);\n    #[cfg(target_endian = \"little\")]\n    let rotated = m.rotate_right(rot);\n    #[cfg(target_endian = \"big\")]\n    let rotated = m.rotate_left(rot);\n    let r = rotated as u128;\n    let mask128 = r | (r \u003c\u003c 32) | (r \u003c\u003c 64) | (r \u003c\u003c 96);\n\n    let (chunks, tail) = rest.as_chunks_mut::\u003c16\u003e();\n    for chunk in chunks {\n        *chunk = (u128::from_ne_bytes(*chunk) ^ mask128).to_ne_bytes();\n    }\n    let rotated_bytes = rotated.to_ne_bytes();\n    for (i, b) in tail.iter_mut().enumerate() {\n        *b ^= rotated_bytes[i % 4];\n    }\n}\n\n/// Validate close code and build the close frame payload (code + reason).\n/// Returns the filled length within the 125-byte buffer.\npub(crate) fn close_payload(code: u16, reason: \u0026str) -\u003e Result\u003c([u8; 125], usize), CallerError\u003e {\n    match co 55,"address":[],"length":0,"stats":{"Line":4}}],"covered":359,"coverable":369},{"path":["/","Users","kon","repos","kamekichi-bot","crates","kamekichi-ws","src","read_buf.rs"],"content":"//! Contiguous read buffer for streaming protocol parsing.\n//!\n//! # Layout\n//!\n//! ```text\n//!  [ consumed | pending | spare | allocated ]\n//!  0        start      end     len         cap\n//! ```\n//!\n//! - **consumed** (`0..start`) — data already processed by the caller.\n//!   [`consume`](ReadBuf::consume) advances `start` but does not discard\n//!   the bytes — they remain accessible until the next\n//!   [`compact`](ReadBuf::compact). This lets callers consume a frame\n//!   header while still borrowing the payload without copying data out.\n//! - **pending** (`start..end`) — data received but not yet processed.\n//! - **spare** (`end..len`) — initialized memory available for the\n//!   next `Read::read` call. `len` only shrinks via an explicit\n//!   [`ReadBuf::maybe_shrink_capacity`] call, so zero-initializing\n//!   the same region again and again is avoided.\n//! - **allocated** (`len..cap`) — allocated but uninitialized part of the\n//!   underlying allocation; can be initialized without reallocating.\n//!\n//! # Filling\n//!\n//! Two fill strategies:\n//!\n//! - [`ReadBuf::fill_from`] — for known lengths: loop until at least `need`\n//!   pending bytes are available. Used for WebSocket frames\n//!   where the payload length is known upfront.\n//!\n//! - [`ReadBuf::read_until`] — search-driven: read in a loop, invoking a\n//!   callback after each read until it produces a value. Used for HTTP\n//!   response header parsing where the terminator position is unknown.\n//!\n//! Both retry immediately on `EINTR`, treat `read() → 0` as EOF,\n//! and return `WouldBlock` when the stream read would block or timeout,\n//! to allow the caller to retry the operation later.\n//!\n//! # Memory lifecycle\n//!\n//! The buffer grows as needed during fills but never shrinks on its\n//! own. The caller is responsible for reclaiming memory via\n//! [`ReadBuf::compact`] (unconditional shift of pending data to offset 0),\n//! [`ReadBuf::maybe_compact`] (compact only when the consumed prefix\n//! exceeds a threshold), and [`ReadBuf::maybe_shrink_capacity`]\n//! (probabilistically release excess backing allocation).\n//! ([`ReadBuf::clear`] resets cursors without touching memory and is\n//! not a reclamation method.)\n\nuse std::io::{self, Read};\nuse std::ops::Range;\n\nuse crate::rng::Rng;\n\n/// Error from [`ReadBuf::read_until`].\n#[derive(Debug)]\npub enum ReadUntilError\u003cE\u003e {\n    /// The stream reached EOF before the callback produced a value.\n    Eof,\n    /// An IO error occurred while reading.\n    Io(io::Error),\n    /// The stream returned `WouldBlock` or `TimedOut`.\n    WouldBlock,\n    /// Pending data reached the caller's [`limit`](ReadBuf::read_until) before the callback produced a value.\n    LimitReached,\n    /// The callback error, passed through.\n    CallbackError(E),\n}\n\n/// Error from [`ReadBuf::fill_from`].\n#[derive(Debug)]\npub enum FillError {\n    /// The stream reached EOF before enough data was available.\n    Eof,\n    /// An IO error occurred while reading.\n    Io(io::Error),\n    /// The stream returned `WouldBlock` or `TimedOut`.\n    WouldBlock,\n}\n\nimpl\u003cE\u003e From\u003cFillError\u003e for ReadUntilError\u003cE\u003e {\n    fn from(e: FillError) -\u003e Self {\n        match e {\n            FillError::Eof =\u003e ReadUntilError::Eof,\n            FillError::WouldBlock =\u003e ReadUntilError::WouldBlock,\n            FillError::Io(e) =\u003e ReadUntilError::Io(e),\n        }\n    }\n}\n\n/// The main buffer container. See [module docs](self) for layout and design.\npub struct ReadBuf {\n    // Invariant: `start \u003c= end \u003c= buf.len()`.\n    buf: Vec\u003cu8\u003e,\n    start: usize,\n    end: usize,\n}\n\nimpl std::fmt::Debug for ReadBuf {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"ReadBuf\")\n            .field(\"start\", \u0026self.start)\n            .field(\"end\", \u0026self.end)\n            .field(\"len\", \u0026self.buf.len())\n            .field(\"cap\", \u0026self.buf.capacity())\n            .finish()\n    }\n}\n\nimpl ReadBuf {\n    /// Create an empty buffer with the given initial allocation.\n    pub fn with_capacity(capacity: usize) -\u003e Self {\n        ReadBuf {\n            buf: Vec::with_capacity(capacity),\n            start: 0,\n            end: 0,\n        }\n    }\n\n    /// Number of unconsumed bytes in the buffer.\n    pub fn pending_len(\u0026self) -\u003e usize {\n        debug_assert!(self.start \u003c= self.end);\n        self.end - self.start\n    }\n\n    /// Unconsumed data in the buffer.\n    pub fn pending(\u0026self) -\u003e \u0026[u8] {\n        \u0026self.buf[self.start..self.end]\n    }\n\n    /// Initialized part of the backing buffer (including read-into\n    /// and zero-initialized regions) at the given absolute range.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    ///\n    /// # Panics\n    ///\n    /// Panics if the range extends past the initialized region of the\n    /// backing buffer.\n    pub fn slice(\u0026self, range: Range\u003cusize\u003e) -\u003e \u0026[u8] {\n        \u0026self.buf[range]\n    }\n\n    /// Absolute offset of the end of pending data in the backing buffer.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    pub fn end_offset(\u0026self) -\u003e usize {\n        self.end\n    }\n\n    /// Absolute offset of the start of pending data in the backing buffer.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    pub fn start_offset(\u0026self) -\u003e usize {\n        self.start\n    }\n\n    /// Advance the read cursor past `n` bytes of pending data.\n    ///\n    /// # Panics\n    ///\n    /// May or may not panic if `n` exceeds the pending data length.\n    pub fn consume(\u0026mut self, n: usize) {\n        let pending_len = self.pending_len();\n        debug_assert!(\n            n \u003c= pending_len,\n            \"consume({n}) exceeds pending length ({pending_len})\",\n        );\n        self.start = self.end.min(self.start.saturating_add(n));\n    }\n\n    /// Ensure at least `need` bytes are available in [`pending()`](Self::pending),\n    /// reading from `reader` as necessary.\n    ///\n    /// May read more than `need` bytes if the OS provides them — the extra\n    /// data stays buffered for subsequent calls.\n    ///\n    /// On error, bytes already read within the same call remain in\n    /// the buffer, so retrying with the same `need` resumes where\n    /// the previous attempt left off.\n    pub fn fill_from(\u0026mut self, reader: \u0026mut impl Read, need: usize) -\u003e Result\u003c(), FillError\u003e {\n        let target = self.start.saturating_add(need);\n        if self.end \u003e= target {\n            return Ok(());\n        }\n        self.ensure_initialized(target);\n        while self.end \u003c target {\n            self.read_once(reader)?;\n        }\n        Ok(())\n    }\n\n    /// Read from `reader` in a loop, calling `f` after each read\n    /// until `f` returns `Ok(Some(value))` or an error occurs.\n    /// `f` may return `Ok(None)` to request more data. `f` gets\n    /// `\u0026ReadBuf` as its argument, so it can inspect the current\n    /// buffer contents and decide whether to continue or return\n    /// a value. Note, however, that for implementing incremental\n    /// scanning, the callback must manage the cursor position\n    /// itself, as it can't call mutable methods on `ReadBuf`.\n    ///\n    /// If there is already pending data in the buffer (`start \u003c\n    /// end`), `f` is called once before the first read.\n    ///\n    /// `limit` bounds how long the search continues: once at least\n    /// `limit` bytes of pending data have accumulated and `f`\n    /// hasn't produced a value, [`ReadUntilError::LimitReached`] is\n    /// returned. A single read may buffer data beyond `limit`;\n    /// that extra is available in the pending section, and the\n    /// data is meant to remain available for later operations.\n    ///\n    /// On error, bytes already read within the same call remain in\n    /// the buffer, and a retry will check them before reading.\n    pub fn read_until\u003cT, E\u003e(\n        \u0026mut self,\n        reader: \u0026mut impl Read,\n        limit: usize,\n        mut f: impl FnMut(\u0026ReadBuf) -\u003e Result\u003cOption\u003cT\u003e, E\u003e,\n    ) -\u003e Result\u003cT, ReadUntilError\u003cE\u003e\u003e {\n        // Check pre-existing data before the first (potentially blocking) read.\n        if self.end \u003e self.start\n            \u0026\u0026 let Some(v) = f(self).map_err(ReadUntilError::CallbackError)?\n        {\n            return Ok(v);\n        }\n        let target = self.start.saturating_add(limit);\n        if self.end \u003e= target {\n            return Err(ReadUntilError::LimitReached);\n        }\n        self.ensure_initialized(target);\n        // `read_once` requires `end \u003c buf.len()`: entering the loop\n        // (and each subsequent iteration) we have `end \u003c target`, and\n        // `ensure_initialized` ensures `target \u003c buf.len()`, so\n        // end \u003c target \u003c buf.len() holds. `target` is fixed throughout,\n        // and `f` cannot modify immutable `\u0026ReadBuf`.\n        loop {\n            self.read_once(reader)?;\n            if let Some(v) = f(self).map_err(ReadUntilError::CallbackError)? {\n                return Ok(v);\n            }\n            if self.end \u003e= target {\n                return Err(ReadUntilError::LimitReached);\n            }\n        }\n    }\n\n    /// Ensure the buffer is initialized to at least `target`.\n    /// May initialize more than requested for efficiency.\n    fn ensure_initialized(\u0026mut self, target: usize) {\n        /// Floor for the readable slice reserved at the start of a read loop\n        /// to avoid tiny reads.\n        const MIN_READ_SLICE: usize = 4096;\n\n        /// Extra headroom past the requested target, so reads closing near the\n        /// target still get reasonably sized slices.\n        const MIN_READ_HEADROOM: usize = 512;\n\n        let needed = target\n            .saturating_add(MIN_READ_HEADROOM)\n            .max(self.end.saturating_add(MIN_READ_SLICE));\n        if self.buf.len() \u003c needed {\n            self.buf.resize(needed, 0);\n        }\n    }\n\n    /// Perform a single read, retrying on `EINTR`. Updates `self.end` on success.\n    fn read_once(\u0026mut self, reader: \u0026mut impl Read) -\u003e Result\u003c(), FillError\u003e {\n        debug_assert!(self.end \u003c self.buf.len());\n        loop {\n            match reader.read(\u0026mut self.buf[self.end..]) {\n                Ok(0) =\u003e return Err(FillError::Eof),\n                Ok(n) =\u003e {\n                    let slice_len = self.buf.len() - self.end;\n                    assert!(\n                        n \u003c= slice_len,\n                        \"Buggy Read::read returned {n} bytes into a {slice_len}-byte slice\",\n                    );\n                    self.end += n;\n                    return Ok(());\n                }\n                Err(e) if e.kind() == io::ErrorKind::Interrupted =\u003e continue,\n                Err(e)\n                    if matches!(\n                        e.kind(),\n                        io::ErrorKind::WouldBlock | io::ErrorKind::TimedOut\n                    ) =\u003e\n                {\n                    return Err(FillError::WouldBlock);\n                }\n                Err(e) =\u003e return Err(FillError::Io(e)),\n            }\n        }\n    }\n\n    /// Shift unconsumed (\"pending\") data to the front of the buffer,\n    /// overwriting the \"consumed\" portion. The spare region beyond\n    /// the new `end` remains initialized so subsequent reads don't\n    /// re-zero. When pending data was shifted, the spare's byte\n    /// contents are left shuffled (the old consumed/pending/spare\n    /// data not overwritten remains untouched).\n    pub fn compact(\u0026mut self) {\n        if self.start == 0 {\n            return;\n        } else if self.start == self.end {\n            self.clear();\n        } else if self.start \u003e 0 {\n            self.buf.copy_within(self.start..self.end, 0);\n            self.end -= self.start;\n            self.start = 0;\n        }\n    }\n\n    /// Compact when the consumed prefix wastes enough memory.\n    /// Returns `true` if compaction actually happened.\n    ///\n    /// Compacts when either all data is consumed, or the consumed prefix\n    /// exceeds both `threshold` and half of total data read (`end`).\n    pub fn maybe_compact(\u0026mut self, threshold: usize) -\u003e bool {\n        if self.start \u003e 0 \u0026\u0026 (self.start == self.end || self.start \u003e threshold.max(self.end / 2)) {\n            self.compact();\n            true\n        } else {\n            false\n        }\n    }\n\n    /// Probabilistically shrink the backing allocation down toward `max_cap`\n    /// if capacity exceeds it, to amortize reallocation cost when buffer\n    /// size spikes repeatedly. Should be called after compacting.\n    ///\n    /// # Panics\n    ///\n    /// May or may not panic if not compacted, i.e. `start \u003e 0`.\n    pub fn maybe_shrink_capacity(\u0026mut self, max_cap: usize, rng: \u0026mut impl Rng) {\n        debug_assert!(self.start == 0, \"call compact() before shrinking\");\n        if self.start == 0 \u0026\u0026 self.buf.capacity() \u003e max_cap \u0026\u0026 rng.one_in_eight_odds() {\n            self.buf.truncate(self.end);\n            self.buf.shrink_to(max_cap);\n        }\n    }\n\n    /// Discard all data, keeping the buffer initialization \u0026mut self, buf: \u0026mut [u8]);\n    /// Return a random `u32`.\n    fn next_u32(\u0026mut self) -\u003e u32 {\n        let mut buf = [0u8; 4];\n        self.fill_bytes(\u0026mut buf);\n        u32::from_le_bytes(buf)\n    }\n    /// Return `true` with 1-in-8 probability.\n    // 1/2^n probabilities are efficient (single bit-mask). Among those,\n    // 1/8 balances fast reclaim (99% within ~35 calls) against not\n    // thrashing on short bursts (87.5% survive the first call).\n    fn one_in_eight_odds(\u0026mut self) -\u003e bool {\n        self.next_u32() \u0026 0b111 == 0\n    }\n}\n\n#[cfg(feature = \"rand\")]\nimpl\u003cR\u003e Rng for R\nwhere\n    R: rand_core::Rng,\n{\n    fn fill_bytes(\u0026mut self, buf: \u0026mut [u8]) {\n        rand_core::Rng::fill_bytes(self, buf)\n    }\n\n    fn next_u32(\u0026mut self) -\u003e u32 {\n        rand_core::Rng::next_u32(self)\n    }\n}\n\n#[cfg(all(feature = \"rand\", test))]\nmod tests {\n    use super::Rng;\n    use std::convert::Infallible;\n    struct Dummy;\n\n    impl rand_core::TryRng for Dummy {\n        type Error = Infallible;\n\n        fn try_next_u32(\u0026mut self) -\u003e Result\u003cu32, Self::Error\u003e {\n            Ok(1)\n        }\n\n        fn try_next_u64(\u0026mut self) -\u003e Result\u003cu64, Self::Error\u003e {\n            unreachable!()\n        }\n\n        fn try_fill_bytes(\u0026mut self, dest: \u0026mut [u8]) -\u003e Result\u003c(), Self::Error\u003e {\n            for b in dest {\n                *b = 0xAA;\n            }\n            Ok(())\n        }\n    }\n\n    #[test]\n    fn test_rand_core_impl_bridge() {\n        let mut buf = [0u8; 4];\n        Rng::fill_bytes(\u0026mut Dummy, \u0026mut buf);\n        assert_eq!(buf, [0xAA; 4]);\n\n        assert_eq!(Rng::next_u32(\u0026mut Dummy), 1);\n    }\n}\n","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":1}},{"line":9,"address":[],"length":0,"stats":{"Line":2}},{"line":10,"address":[],"length":0,"stats":{"Line":3}},{ }\n    }\n\n    /// Whether there is unsent data in the buffer.\n    pub fn has_pending(\u0026self) -\u003e bool {\n        self.pos \u003c self.buf.len()\n    }\n\n    /// Number of bytes waiting to be sent.\n    pub fn pending_len(\u0026self) -\u003e usize {\n        self.buf.len() - self.pos\n    }\n\n    /// Append bytes to the buffer without sending.\n    pub fn push(\u0026mut self, data: \u0026[u8]) {\n        self.buf.extend_from_slice(data);\n    }\n\n    /// Append a single byte.\n    pub fn push_byte(\u0026mut self, b: u8) {\n        self.buf.push(b);\n    }\n\n    /// Reserve space for at least `additional` more bytes.\n    pub fn reserve(\u0026mut self, additional: usize) {\n        self.buf.reserve(additional);\n    }\n\n    /// Mutable reference to the last `len` bytes in the buffer.\n    pub fn last_mut(\u0026mut self, len: usize) -\u003e \u0026mut [u8] {\n        let start = self.buf.len() - len;\n        \u0026mut self.buf[start..]\n    }\n\n    /// Drain pending data to `stream`.  Retries on `Interrupted`;\n    /// propagates all other errors.\n    pub fn flush(\u0026mut self, stream: \u0026mut impl Write) -\u003e Result\u003c(), FlushError\u003e {\n        while self.pos \u003c self.buf.len() {\n            match stream.write(\u0026self.buf[self.pos..]) {\n                Ok(0) =\u003e return Err(FlushError::WriteClosed),\n                Ok(n) =\u003e self.pos += n,\n                Err(e) if e.kind() == io::ErrorKind::Interrupted =\u003e {}\n                Err(e) =\u003e return Err(FlushError::Io(e)),\n            }\n        }\n        Ok(())\n    }\n\n    /// Best-effort drain + stream flush.  Errors are silently ignored.\n    pub fn try_flush(\u0026mut self, stream: \u0026mut impl Write) {\n        let _ = self.flush(stream);\n        let _ = stream.flush();\n    }\n\n    /// Probabilistically shrink the backing allocation if capacity\n    /// exceeds `max_cap`.  Only shrinks when all data has been sent.\n    pub fn maybe_shrink(\u0026mut self, max_cap: usize, rng: \u0026mut impl Rng) {\n        if self.pos \u003e= self.buf.len() \u0026\u0026 self.buf.capacity() \u003e max_cap \u0026\u0026 rng.one_in_eight_odds() {\n            self.buf.clear();\n            self.pos = 0;\n            self.buf.shrink_to(max_cap);\n        }\n    }\n\n    /// Clear and return a mutable reference to the backing buffer\n    /// for use as scratch space.\n    pub fn as_scratch(\u0026mut self) -\u003e \u0026mut Vec\u003cu8\u003e {\n        self.buf.clear();\n        self.pos = 0;\n        \u0026mut self.buf\n    }\n\n    /// Discard all data.\n    pub fn clear(\u0026mut self) {\n        self.buf.clear();\n        self.pos = 0;\n    }\n}\n","traces":[{"line":15,"address":[],"length":0,"stats":{"Line":17}},{"line":16,"address":[],"length":0,"stats":{"Line":12}},{"line":17,"address":[],"length":0,"stats":{"Line":16}},{"line":18,"address":[],"length":0,"stats":{"Line":36}},{"line":36,"address":[],"length":0,"stats":{"Line":123}},{"line":38,"address":[],"length":0,"stats":{"Line":123}},{"line":44,"address":[],"length":0,"stats":{"Line":225}},{"line":45,"address":[],"length":0,"stats":{"Line":450}},{"line":49,"address":[],"length":0,"stats":{"Line":20}},{"line":50,"address":[],"length":0,"stats":{"Line":40}},{"line":54,"address":[],"length":0,"stats":{"Line":95}},{"line":55,"address":[],"length":0,"stats":{"Line":285}},{"line":59,"address":[],"length":0,"stats":{"Line":92}},{"line":60,"address":[],"length":0,"stats":{"Line":276}},{"line":64,"address":[],"length":0,"stats":{"Line":46}},{"line":65,"address":[],"length":0,"stats":{"Line":138}},{"line":69,"address":[],"length":0,"stats":{"Line":46}},{"line":70,"address":[],"length":0,"stats":{"Line":138}},{"line":71,"address":[],"length":0,"stats":{"Line":46}},{"line":76,"address":[],"length":0,"stats":{"Line":58}},{"line":77,"address":[],"length":0,"stats":{"Line":182}},{"line":78,"address":[],"length":0,"stats":{"Line":177}},{"line":79,"address":[],"length":0,"stats":{"Line":2}},{"l
