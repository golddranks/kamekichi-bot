<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

de(u8),\n    /// Extended length field uses more bytes than necessary.\n    NonMinimalLength,\n    /// 64-bit payload length has the most significant bit set.\n    PayloadLengthMsb,\n    /// Missing or invalid `Upgrade: websocket` header.\n    MissingUpgrade,\n    /// Missing or invalid `Connection: Upgrade` header.\n    MissingConnection,\n    /// Close status code is not valid per RFC 6455 section 7.4.\n    InvalidCloseCode(u16),\n    /// Server sent a masked frame (clients must not receive masked frames).\n    MaskedServerFrame,\n    /// Too many frames arrived faster than they could trickle in.\n    Flood,\n    /// Server selected a subprotocol that was not offered by the client,\n    /// or sent `Sec-WebSocket-Protocol` when the client did not request one.\n    InvalidSubprotocol,\n    /// No frame was received before the [`send_ping`](crate::WebSocket::send_ping) deadline.\n    PingTimeout,\n}\n\n/// Caller-side error.  Reconnecting will not help.\n#[derive(Debug)]\n#[non_exhaustive]\npub enum CallerError {\n    /// The connection is closing; no further operations are allowed.\n    Closing,\n    /// A header name, value, host, or path contains a disallowed character.\n    InvalidHeaderValue,\n    /// Close code is not valid for sending (RFC 6455 §7.4).\n    InvalidCloseCode(u16),\n    /// Close reason exceeds 123 bytes.\n    CloseReasonTooLong(usize),\n}\n\n// --- ConnectionError impls ---\n\nimpl ConnectionError {\n    pub(crate) fn is_would_block(\u0026self) -\u003e bool {\n        matches!(\n            self,\n            ConnectionError::Io(e) if matches!(e.kind(), io::ErrorKind::WouldBlock | io::ErrorKind::TimedOut)\n        )\n    }\n}\n\nimpl Display for ConnectionError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            ConnectionError::Io(e) =\u003e write!(f, \"IO: {e}\"),\n            ConnectionError::Closed =\u003e write!(f, \"connection closed\"),\n            ConnectionError::HeadersTooLarge =\u003e write!(f, \"response headers too large\"),\n            ConnectionError::BadStatus =\u003e write!(f, \"expected HTTP 101\"),\n            ConnectionError::MissingAccept =\u003e write!(f, \"missing Sec-WebSocket-Accept\"),\n            ConnectionError::BadAccept =\u003e write!(f, \"invalid Sec-WebSocket-Accept\"),\n            ConnectionError::BadReservedBits(bits) =\u003e write!(f, \"non-zero RSV bits: {bits:#x}\"),\n            ConnectionError::PayloadTooLarge(len) =\u003e {\n                write!(f, \"frame payload too large: {len} bytes\")\n            }\n            ConnectionError::UnexpectedContinuation =\u003e write!(f, \"unexpected continuation frame\"),\n            ConnectionError::FragmentedMessageTooLarge(len) =\u003e {\n                write!(f, \"fragmented message too large: {len} bytes\")\n            }\n            ConnectionError::InvalidUtf8(e) =\u003e {\n                write!(f, \"invalid UTF-8 in text frame at {}\", e.valid_up_to())\n            }\n            ConnectionError::DataDuringFragmentation =\u003e {\n                write!(f, \"new data frame during fragmentation\")\n            }\n            ConnectionError::FragmentedControl =\u003e write!(f, \"fragmented control frame\"),\n            ConnectionError::ControlPayloadTooLarge(len) =\u003e {\n                write!(f, \"control frame payload too large: {len}\")\n            }\n            ConnectionError::BadClosePayload =\u003e {\n                write!(f, \"close frame payload must be 0 or \u003e= 2 bytes\")\n            }\n            ConnectionError::UnknownOpcode(op) =\u003e write!(f, \"unknown opcode: {op}\"),\n            ConnectionError::NonMinimalLength =\u003e write!(f, \"non-minimal payload length encoding\"),\n            ConnectionError::PayloadLengthMsb =\u003e {\n                write!(f, \"64-bit payload length has MSB set (RFC 6455 §5.2)\")\n            }\n            ConnectionError::MissingUpgrade =\u003e write!(f, \"missing or \n}\n\n// --- CallerError impls ---\n\nimpl Display for CallerError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            CallerError::Closing =\u003e write!(f, \"connection is closing\"),\n            CallerError::InvalidHeaderValue =\u003e write!(f, \"invalid character in header value\"),\n            CallerError::InvalidCloseCode(code) =\u003e write!(f, \"invalid close code: {code}\"),\n            CallerError::CloseReasonTooLong(len) =\u003e {\n                write!(f, \"close reason too long: {len} bytes (max 123)\")\n            }\n        }\n    }\n}\n\nimpl StdError for CallerError {}\n\n// --- Error impls ---\n\nimpl Display for Error {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Error::Reconnect(e) =\u003e write!(f, \"connection error: {e}\"),\n            Error::Fatal(e) =\u003e write!(f, \"caller error: {e}\"),\n        }\n    }\n}\n\nimpl StdError for Error {\n    fn source(\u0026self) -\u003e Option\u003c\u0026(dyn StdError + 'static)\u003e {\n        match self {\n            Error::Reconnect(e) =\u003e Some(e),\n            Error::Fatal(e) =\u003e Some(e),\n        }\n    }\n}\n\nimpl From\u003cFlushError\u003e for Error {\n    fn from(e: FlushError) -\u003e Self {\n        Error::Reconnect(e.into())\n    }\n}\n\nimpl From\u003cConnectionError\u003e for Error {\n    fn from(e: ConnectionError) -\u003e Self {\n        Error::Reconnect(e)\n    }\n}\n\nimpl From\u003cCallerError\u003e for Error {\n    fn from(e: CallerError) -\u003e Self {\n        Error::Fatal(e)\n    }\n}\n","traces":[{"line":93,"address":[],"length":0,"stats":{"Line":32}},{"line":94,"address":[],"length":0,"stats":{"Line":3}},{"line":95,"address":[],"length":0,"stats":{"Line":5}},{"line":96,"address":[],"length":0,"stats":{"Line":12}},{"line":102,"address":[],"length":0,"stats":{"Line":26}},{"line":103,"address":[ ]\n#![warn(missing_docs)]\n//! A lightweight, low-level WebSocket (RFC 6455) client library.\n//!\n//! Works with any stream implementing [`std::io::Read`] + [`std::io::Write`]\n//! — blocking, non-blocking, TCP, or TLS. No async runtime needed.\n//!\n//! # Connection lifecycle\n//!\n//! 1. **Create** — [`WebSocket::new`] allocates buffers (no I/O).\n//!    Chain [`max_payload`](WebSocket::max_payload) /\n//!    [`max_buf_size`](WebSocket::max_buf_size) to configure limits.\n//!    // TODO: ↑ are this all?\n//! 2. **Connect** — [`connect`](WebSocket::connect) (or\n//!    [`try_connect`](WebSocket::try_connect)) performs the HTTP upgrade\n//!    handshake.  Pass extra headers with\n//!    [`connect_with_headers`](WebSocket::connect_with_headers).\n//!    // TODO: ↑ is this all? What about subprotocols? Should it be mentioned that the stream is handed in here?\n//! 3. **Message loop** — [`read_message`](WebSocket::read_message)\n//!    returns [`ReadStatus`]: either a [`Message`] or\n//!    [`Idle`](ReadStatus::Idle).  Check\n//!    [`last_activity`](WebSocket::last_activity) for connection health.\n//!    Send with [`send_text`](WebSocket::send_text) /\n//!    [`send_binary`](WebSocket::send_binary).\n//! 4. **Close** — [`send_close`](WebSocket::send_close), then keep\n//!    calling [`read_message`](WebSocket::read_message) until\n//!    [`Message::Close`] arrives.\n//! 5. **Reuse** — [`disconnect`](WebSocket::disconnect) returns the\n//!    streamless `WebSocket` and the stream separately; the `WebSocket`\n//!    can be reconnected without reallocating.\n//!    // TODO: check that the closing and disconnecting logic is sound\n\nmod error;\nmod proto;\nmod read_buf;\nmod rng;\nmod send_buf;\n\n#[cfg(test)]\nmod tests;\n\nuse std::io::{self, Read, Write};\nuse std::time::Instant;\n\npub use error::{CallerError, ConnectionError, Error};\nuse proto::*;\npub use rng::Rng;\n\n// TODO: these should be in proto.rs?\n/// Default maximum payload size: 16 MiB.\npub(crate) const DEFAULT_MAX_PAYLOAD: usize = 16 * 1024 * 1024;\n/// Default target buffer capacity: 1 MiB.\n/// This can be momentarily exceeded while reading a large payload,\n/// but will be reclaimed later.\npub(crate) const DEFAULT_MAX_BUF_SIZE: usize = 1024 * 1024;\n\n/// Outcome of a send operation.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum SendStatus {\n    /// Frame fully written to the stream. // TODO: no quarantees about flushing, right?\n    Done,\n    /// Frame is queued in the `WebSocket`s own send buffer but not yet (fully) written.\n    /// Call [`WebSocket::flush`] to finish sending.\n    Queued,\n    /// A previously queued frame is still draining (// TODO: draining? try to be consistent with the vocabulary) and the new frame was\n    /// **not** built.  Call [`WebSocket::flush`] to finish the pending\n    /// write, then retry the send.\n    RetryLater,\n}\n\n/// A complete WebSocket message, borrowing from the WebSocket's\n/// internal buffers.\n#[derive(Debug)]\npub enum Message\u003c'a\u003e {\n    /// A UTF-8 text message.\n    Text(\u0026'a str),\n    /// A binary message.\n    Binary(\u0026'a [u8]),\n    /// A close frame with optional status code and reason. // TODO: Option? What about status code 1005\n    Close(Option\u003cu16\u003e, \u0026'a str),\n}\n\n/// Result of [`WebSocket::read_message`].\n#[derive(Debug)]\npub enum ReadStatus\u003c'a\u003e {\n    /// A complete message was read.\n    Message(Message\u003c'a\u003e),\n    /// No complete message is available.\n    ///\n    /// This covers non-blocking `WouldBlock`, read timeouts, and\n    /// frame budget exhaustion.  Use\n    /// [`last_activity`](WebSocket::last_activity) to tell whether\n    /// the connection is alive: if recent, frames are flowing but no\n    /// complete message was produced yet; if stale or `None`, the\n    /// wire has been silent and a liveness probe (ping) may be warranted.\n    Idle,\n}\n\nimpl\u003c'a\u003e ReadStatus\u003c'a\u003e {\n    /// Returns the contained message, or `None` if idle.\n    pub fn message(self) -\u003e Option\u003cMessage\u003c'a\u003e\u003e {\n        match self {\n            ReadStatus::Message(m) =\u003e Some(m),\n            ReadStatus::Idle =\u003e None,\n        }\n    }\n}\n\n/// A WebSocket client over an arbitrary byte stream.\npub struct WebSocket\u003cS, R\u003e {\n    pub(crate) stream: S,\n    /// I/O buffers.  Split from `sess` so that `read_message` can\n    /// return a [`Message`] borrowing from here while `sess` remains\n    /// free to mutate.\n    pub(crate) bufs: Buffers,\n    /// Protocol state (never borrowed by a returned [`Message`]).\n    pub(crate) sess: Session,\n    pub(crate) rng: R,\n}\n\nimpl\u003cS: Read + Write, R: Rng\u003e WebSocket\u003cS, R\u003e {\n    /// Read the next complete WebSocket message from the stream.\n    ///\n    /// Frames are read and reassembled per RFC 6455 §5–6.  The returned\n    /// [`Message`] borrows from the WebSocket's internal read buffer —\n    /// no copies or allocations for single-frame messages.\n    ///\n    /// Control frames (ping, pong, close) are handled inline: pings are\n    /// answered with pongs automatically, and close frames echo the status\n    /// code back before returning [`Message::Close`].\n    ///\n    /// Returns [`ReadStatus::Idle`] when no complete message is available.\n    /// Check [`last_activity`](Self::last_activity) to distinguish\n    /// budget exhaustion (recent activity — connection is alive) from\n    /// I/O silence (stale or `None` — consider a\n    /// [`send_ping`](Self::send_ping)).\n    pub fn read_message(\u0026mut self) -\u003e Result\u003cReadStatus\u003c'_\u003e, Error\u003e {\n        if self.sess.close_state == CloseState::Closed {\n            return Err(CallerError::Closing.into());\n        }\n        match read_message(\n            \u0026mut self.bufs,\n            \u0026mut self.stream,\n            \u0026mut self.sess,\n            \u0026mut self.rng,\n        ) {\n            Ok(Some(msg)) =\u003e {\n                let now = Instant::now();\n                self.sess.last_activity = Some(now);\n                self.sess.ping_deadline = None;\n                Ok(ReadStatus::Message(msg))\n            }\n            Ok(None) =\u003e {\n                // Budget exhausted — frames were processed.\n                let now = Instant::now();\n                self.sess.last_activity = Some(now);\n                self.sess.ping_deadline = None;\n                Ok(ReadStatus::Idle)\n            }\n            Err(e) if e.is_would_block() =\u003e {\n                if let Some(deadline) = self.sess.ping_deadline\n                    \u0026\u0026 Instant::now() \u003e= deadline\n                {\n                    self.sess.ping_deadline = None;\n                    self.sess.close_state = CloseState::Closed;\n                    return Err(ConnectionError::PingTimeout.into());\n                }\n                Ok(ReadStatus::Idle)\n            }\n            Err(e) =\u003e {\n                self.sess.close_state = CloseState::Closed;\n                Err(e.into())\n            }\n        }\n    }\n\n    /// Build a frame and flush it to the stream.\n    ///\n    /// If a previous frame is still partially queued, it is flushed first.\n    /// Returns `Ok(RetryLater)` if the previous frame could not be drained\n    /// (the new frame was **not** built — flush and retry).  Returns\n    /// `Ok(Queued)` if the new frame was built but only partially flushed\n    /// — call [`flush`](Self::flush) to finish.\n    fn send_frame(\u0026mut self, opcode: u8, payload: \u0026[u8]) -\u003e Result\u003cSendStatus, Error\u003e {\n        if self.sess.close_state != CloseState::Open {\n            return Err(CallerError::Closing.into());\n        }\n        if self.bufs.send.has_pending() {\n            match self.bufs.send.flush(\u0026mut self.stream) {\n                Ok(()) =\u003e {}\n                Err(e) if e.is_would_block() =\u003e return ;\nuse crate::rng::Rng;\nuse crate::send_buf::SendBuf;\nuse crate::{Message, WebSocket};\n\npub(crate) const WS_GUID: \u0026str = \"258EAFA5-E914-47DA-95CA-C5AB0DC85B11\";\nconst MAX_HEADER: usize = 8192;\n/// Maximum wire size of a single control frame (2-byte header + 125-byte\n/// payload).  Reads of this size or smaller indicate that data arrived\n/// slowly and count as \"trickle\" for flood detection.  Also used as the\n/// divisor for message-completion flood relief.\nconst SMALL_READ_THRESHOLD: usize = 127;\n\n// Frame header bits (RFC 6455 §5.2)\npub(crate) const FIN: u8 = 0b1000_0000;\npub(crate) const RESERVED_MASK: u8 = 0b0111_0000;\npub(crate) const OPCODE_MASK: u8 = 0b0000_1111;\npub(crate) const MASK_BIT: u8 = 0b1000_0000;\npub(crate) const LEN_MASK: u8 = 0b0111_1111;\n\n// Opcodes (RFC 6455 §5.2)\npub(crate) const OP_CONTINUATION: u8 = 0x0;\npub(crate) const OP_TEXT: u8 = 0x1;\npub(crate) const OP_BINARY: u8 = 0x2;\npub(crate) const OP_CLOSE: u8 = 0x8;\npub(crate) const OP_PING: u8 = 0x9;\npub(crate) const OP_PONG: u8 = 0xA;\n\n/// Close handshake state (RFC 6455 §7.1).\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub(crate) enum CloseState {\n    /// Connection is open — reads and writes allowed.\n    Open,\n    /// We sent a close frame.  Writes are blocked; reads continue\n    /// until the server's close response arrives.\n    CloseSent,\n    /// Close handshake complete (both sides).  No further I/O.\n    Closed,\n}\n\n/// I/O buffers.  Separated from [`Session`] so that `read_message` can\n/// lend the returned [`Message`] from these buffers while [`Session`]\n/// remains free to mutate (e.g. poisoning `close_state` on error).\npub(crate) struct Buffers {\n    /// Incoming byte buffer.  Non-fragmented messages are borrowed\n    /// directly from here, avoiding copies.\n    pub(crate) read: ReadBuf,\n    /// Outgoing byte buffer; partially-flushed frames are retried on\n    /// the next flush.\n    pub(crate) send: SendBuf,\n    /// Reassembly buffer for fragmented BINARY messages.\n    pub(crate) fragment_bin: Vec\u003cu8\u003e,\n    /// Reassembly buffer for fragmented TEXT messages.\n    pub(crate) fragment_text: String,\n    /// Incomplete UTF-8 tail bytes from the last TEXT fragment (1–3 bytes).\n    utf8_tail: [u8; 3],\n    utf8_tail_len: u8,\n}\n\n/// Protocol state that is never borrowed by a returned [`Message`].\npub(crate) struct Session {\n    /// Opcode of the first frame in a fragmented message (0 = no active fragmentation).\n    pub(crate) fragment_opcode: u8,\n    pub(crate) close_state: CloseState,\n    /// Maximum payload size (bytes) accepted for a single frame or\n    /// reassembled fragmented message.\n    pub(crate) max_payload: usize,\n    /// Target buffer capacity. After processing a large message the read\n    /// buffer is shrunk back to this size to avoid permanent memory bloat.\n    pub(crate) max_buf_size: usize,\n    /// Max frames processed per [`read_message`] call without producing\n    /// a message before returning [`ReadStatus::Idle`].  `usize::MAX` = unlimited.\n    pub(crate) frame_budget: usize,\n    /// Running score for flood detection.  Incremented per frame,\n    /// decremented per small read and per completed message.\n    pub(crate) flood_score: usize,\n    /// Threshold above which [`flood_score`] triggers an error.\n    pub(crate) max_flood_score: usize,\n    /// Comma-joined subprotocol tokens to send in `Sec-WebSocket-Protocol`.\n    /// `None` means no subprotocol negotiation.\n    pub(crate) subprotocols: Option\u003cString\u003e,\n    /// The subprotocol selected by the server during the handshake.\n    pub(crate) negotiated_subprotocol: Option\u003cString\u003e,\n    /// Deadline by which a pong (or any frame) must arrive after a\n    /// [`send_ping`](WebSocket::send_ping).  Cleared when any frame\n    /// is received; triggers [`ConnError::PingTimeout`] if\n    /// exceeded during an idle [`read_message`] call.\n    pub(crate) ping_deadline: Option\u003cInstant\u003e,\n    /// When the last frame was received.  Updated on every\n    /// [`read_message`](WebSocket::read_message) call that processed\n    /// at least one frame.\n    pub(crate) last_activity: Option\u003cInstant\u003e,\n}\n\nimpl Buffers {\n    pub(crate) fn new() -\u003e Self {\n        Buffers {\n            read: ReadBuf::with_capacity(MAX_HEADER),\n            send: SendBuf::with_capacity(256),\n            fragment_bin: Vec::new(),\n            fragment_text: String::new(),\n            utf8_tail: [0; 3],\n            utf8_tail_len: 0,\n        }\n    }\n\n    pub(crate) fn clear(\u0026mut self) {\n        self.read.clear();\n        self.send.clear();\n        self.fragment_bin.clear();\n        self.fragment_text.clear();\n        self.utf8_tail_len = 0;\n    }\n}\n\npub(crate) fn read_message\u003c'b, S: Read + Write, R: Rng\u003e(\n    bufs: \u0026'b mut Buffers,\n    stream: \u0026mut S,\n    sess: \u0026mut Session,\n    rng: \u0026mut R,\n) -\u003e Result\u003cOption\u003cMessage\u003c'b\u003e\u003e, ConnError\u003e {\n    // If a previous send (e.g. a pong reply) was only partially\n    // written to the stream, finish sending it now.\n    if bufs.send.has_pending() {\n        match bufs.send.flush(stream) {\n            Ok(()) =\u003e {\n                let _ = stream.flush();\n                bufs.send.maybe_shrink(sess.max_buf_size, rng);\n            }\n            // Don't propagate — this is a read call; returning\n            // WouldBlock would make the caller wait for readability\n            // when the real bottleneck is writability.  The bytes\n            // stay in the send buffer and will go out on the next attempt\n            // on a best-effort basis.\n            Err(e) if e.is_would_block() =\u003e {}\n            Err(e) =\u003e return Err(e.into()),\n        }\n    }\n    let mut budget = sess.frame_budget;\n    loop {\n        if bufs.read.maybe_compact(MAX_HEADER) {\n            bufs.read.maybe_shrink_capacity(sess.max_buf_size, rng);\n        }\n        // Shrink fragment reassembly buffers after a large message.\n        // Done here (top of loop) rather than at completion time\n        // because the returned Message borrows from the buffer.\n        if sess.fragment_opcode == 0 \u0026\u0026 rng.one_in_eight_odds() {\n            if bufs.fragment_bin.capacity() \u003e sess.max_buf_size {\n                bufs.fragment_bin.clear();\n                bufs.fragment_bin.shrink_to(sess.max_buf_size);\n            }\n            if bufs.fragment_text.capacity() \u003e sess.max_buf_size {\n                bufs.fragment_text.clear();\n                bufs.fragment_text.shrink_to(sess.max_buf_size);\n            }\n        }\n\n        // Track how many bytes fill_from reads from the OS.\n        let old_end = bufs.read.end_offset();\n\n        // Parse frame header\n        let (fin, opcode, payload_len) = {\n            bufs.read.fill_from(stream, 2)?;\n            let hdr = bufs.read.pending();\n            let byte0 = hdr[0];\n            let byte1 = hdr[1];\n\n            let rsv = byte0 \u0026 RESERVED_MASK;\n            if rsv != 0 {\n                return Err(ConnError::BadReservedBits(rsv));\n            }\n\n            let fin = byte0 \u0026 FIN != 0;\n            let opcode = byte0 \u0026 OPCODE_MASK;\n            let masked = byte1 \u0026 MASK_BIT != 0;\n            if masked {\n                return Err(ConnError::MaskedServerFrame);\n            }\n            let len_byte = (byte1 \u0026 LEN_MASK) as usize;\n\n            let (header_size, payload_len) = match len_byte {\n                n @ 0..=125 =\u003e (2, n),\n                126 =\u003e {\n                    bufs.read.fill_from(stream, 4)?;\n                    let hdr = bufs.read.pending();\n                    let len = u16::from_be_bytes([hdr[2], hdr[3]]) as usize;\n                    if len \u003c 126 {\n                        return Err(ConnError::NonMinimalLength);\n                    }\n                    if len \u003e sess.max_payload {\n                        return Err(ConnError::PayloadTooLarge(len as u64));\n                    }\n                    (4, len)\n                }\n                127 =\u003e {\n                    bufs.read.fill_from(stream, 10)?;\n                    let hdr = bufs.read.pending();\n                    let len = u64::from_be_bytes(hdr[2..10].try_into().unwrap());\n                    if len \u003e\u003e 63 != 0 {\n                        return Err(ConnError::PayloadLengthMsb);\n                    }\n                    if len \u003c 65536 {\n                        return Err(ConnError::NonMinimalLength);\n                    }\n                    if len \u003e sess.max_payload as u64 {\n                        return Err(ConnError::PayloadTooLarge(len));\n                    }\n                    (10, len as usize)\n                }\n                _ =\u003e unreachable!(\"7-bit value is always 0..=127\"),\n            };\n\n            if opcode \u003e= OP_CLOSE {\n                if !fin {\n                    return Err(ConnError::FragmentedControl);\n                }\n                if payload_len \u003e 125 {\n                    return Err(ConnError::ControlPayloadTooLarge(payload_len));\n                }\n            }\n\n            let frame_size = header_size + payload_len;\n            bufs.read.fill_from(stream, frame_size)?;\n            bufs.read.consume(frame_size);\n\n            (fin, opcode, payload_len)\n        };\n\n        // A small read means data trickled in (one frame); a big\n        // read (or no read at all) means data was already buffered.\n        let bytes_read = bufs.read.end_offset() - old_end;\n        if bytes_read \u003e 0 \u0026\u0026 bytes_read \u003c= SMALL_READ_THRESHOLD {\n            sess.flood_score = sess.flood_score.saturating_sub(1);\n        }\n\n        // Flood detection: every frame adds pressure.\n        sess.flood_score += 1;\n        if sess.flood_score \u003e sess.max_flood_score {\n            return Err(ConnError::Flood);\n        }\n\n        let pos = bufs.read.start_offset();\n        let payload_range = pos - payload_len..pos;\n\n        match opcode {\n            OP_CONTINUATION =\u003e {\n                if sess.fragment_opcode == 0 {\n                    return Err(ConnError::UnexpectedContinuation);\n                }\n                let payload = bufs.read.slice(payload_range);\n                if sess.fragment_opcode == OP_TEXT {\n                    let total =\n                        bufs.fragment_text.len() + bufs.utf8_tail_len as usize + payload_len;\n                    if total \u003e sess.max_payload {\n                        return Err(ConnError::FragmentedMessageTooLarge(total));\n                    }\n                    push_text_payload(\n                        \u0026mut bufs.fragment_text,\n                        \u0026mut bufs.utf8_tail,\n                        \u0026mut bufs.utf8_tail_len,\n                        payload,\n                        fin,\n                    )?;\n                    if fin {\n                        sess.fragment_opcode = 0;\n                        let relief = 1.max(bufs.fragment_text.len() / SMALL_READ_THRESHOLD);\n                        sess.flood_score = sess.flood_score.saturating_sub(relief);\n                        return Ok(Some(Message::Text(\u0026bufs.fragment_text)));\n                    }\n                } else if sess.fragment_opcode == OP_BINARY {\n                    let total = bufs.fragment_bin.len() + payload_len;\n                    if total \u003e sess.max_payload {\n                        return Err(ConnError::FragmentedMessageTooLarge(total));\n                    }\n                    bufs.fragment_bin.extend_from_slice(payload);\n                    if fin {\n                        sess.fragment_opcode = 0;\n                        let relief = 1.max(bufs.fragment_bin.len() / SMALL_READ_THRESHOLD);\n                        sess.flood_score = sess.flood_score.saturating_sub(relief);\n                        return Ok(Some(Message::Binary(\u0026bufs.fragment_bin)));\n                    }\n                } else {\n                    unreachable!(\"fragment_opcode is only set to OP_TEXT or OP_BINARY\")\n                }\n            }\n\n            OP_TEXT | OP_BINARY =\u003e {\n                if sess.fragment_opcode != 0 {\n                    return Err(ConnError::DataDuringFragmentation);\n                }\n                if fin {\n                    let relief = 1.max(payload_len / SMALL_READ_THRESHOLD);\n                    sess.flood_score = sess.flood_score.saturating_sub(relief);\n                    let buf = bufs.read.slice(payload_range);\n                    return Ok(Some(match opcode {\n                        OP_TEXT =\u003e Message::Text(std::str::from_utf8(buf)?),\n                        _ =\u003e Message::Binary(buf),\n                    }));\n                }\n                // Start fragmented message.\n                let payload = bufs.read.slice(payload_range);\n                if opcode == OP_TEXT {\n                    bufs.fragment_text.clear();\n                    bufs.utf8_tail_len = 0;\n                    push_text_payload(\n                        \u0026mut bufs.fragment_text,\n                        \u0026mut bufs.utf8_tail,\n                        \u0026mut bufs.utf8_tail_len,\n                        payload,\n                        false,\n                    )?;\n                } else {\n                    bufs.fragment_bin.clear();\n                    bufs.fragment_bin.extend_from_slice(payload);\n                }\n                sess.fragment_opcode = opcode;\n            }\n\n            OP_CLOSE =\u003e {\n                let echo = sess.close_state == CloseState::Open;\n                sess.close_state = CloseState::Closed;\n                return handle_close(\n                    stream,\n                    \u0026mut bufs.send,\n                    rng,\n                    bufs.read.slice(payload_range),\n                    echo,\n                )\n                .map(Some);\n            }\n\n            // Pong replies are sent even during CloseSent:\n            // control frames are not data frames, and most\n            // peers expect pong responses until the TCP\n            // connection is torn down.\n            OP_PING =\u003e {\n                if bufs.send.pending_len() \u003c sess.max_buf_size {\n                    build_frame(\u0026mut bufs.send, rng, OP_PONG, bufs.read.slice(payload_range));\n                }\n                bufs.send.try_flush(stream);\n            }\n\n            OP_PONG =\u003e {}\n\n            _ =\u003e return Err(ConnError::UnknownOpcode(opcode)),\n        }\n\n        // Budget: yield to the caller after processing too many\n        // frames without producing a message.\n        budget = budget.saturating_sub(1);\n        if budget == 0 {\n            return Ok(None);\n        }\n    }\n}\n\nimpl Session {\n    pub(crate) fn new() -\u003e Self {\n        Session {\n            fragment_opcode: 0,\n            close_state: CloseState::Open,\n            max_payload: crate::DEFAULT_MAX_PAYLOAD,\n            max_buf_size: crate::DEFAULT_MAX_BUF_SIZE,\n            frame_budget: usize::MAX,\n            flood_score: 0,\n            max_flood_score: 1000,\n            subprotocols: None,\n            negotiated_subprotocol: None,\n            ping_deadline: None,\n            last_activity: None,\n        }\n    }\n\n    /// Reset runtime state for a new connection, preserving configuration.\n    pub(crate) fn reset(\u0026mut self) {\n        self.fragment_opcode = 0;\n        self.close_state = CloseState::Open;\n        self.flood_score = 0;\n        self.negotiated_subprotocol = None;\n        self.ping_deadline = None;\n        self.last_activity = None;\n    }\n}\n\nimpl\u003cS: Read + Write, R: Rng\u003e WebSocket\u003cS, R\u003e {\n    /// Run the WebSocket opening handshake on the underlying stream.\n    pub(crate) fn handshake(\n        \u0026mut self,\n        host: \u0026str,\n        path: \u0026str,\n        headers: \u0026[(\u0026str, \u0026str)],\n    ) -\u003e Result\u003c(), ConnError\u003e {\n        self.bufs.clear();\n        self.sess.reset();\n        let mut line_ends = [0usize; 64];\n        let mut n_lines = 0;\n\n        let key = {\n            let mut raw = [0u8; 16];\n            self.rng.fill_bytes(\u0026mut raw);\n            let mut encoded = [0u8; 24];\n            base64::engine::general_purpose::STANDARD\n                .encode_slice(raw, \u0026mut encoded)\n                .expect(\"24-byte buffer fits 16 bytes of base64\");\n            encoded\n        };\n\n        {\n            let key = std::str::from_utf8(\u0026key).expect(\"base64 output is ASCII\");\n            let buf = self.bufs.send.as_scratch();\n            use std::io::Write as _;\n            write!(\n                buf,\n                \"GET {path} HTTP/1.1\\r\\n\\\n                 Host: {host}\\r\\n\\\n                 Upgrade: websocket\\r\\n\\\n                 Connection: Upgrade\\r\\n\\\n                 Sec-WebSocket-Key: {key}\\r\\n\\\n                 Sec-WebSocket-Version: 13\\r\\n\"\n            )\n            .expect(\"write to Vec cannot fail\");\n            if let Some(ref protos) = self.sess.subprotocols {\n                write!(buf, \"Sec-WebSocket-Protocol: {protos}\\r\\n\")\n                    .expect(\"write to Vec cannot fail\");\n            }\n            for \u0026(name, value) in headers {\n                write!(buf, \"{name}: {value}\\r\\n\").expect(\"write to Vec cannot fail\");\n            }\n            buf.extend_from_slice(b\"\\r\\n\");\n            self.stream.write_all(buf)?;\n            self.bufs.send.clear();\n            self.stream.flush()?;\n        }\n\n        let header_end = {\n            let mut scan = 0;\n            let mut prev_nl: Option\u003cusize\u003e = None;\n            let n_lines = \u0026mut n_lines;\n            self.bufs\n                .read\n                .read_until::\u003c_, ConnError\u003e(\u0026mut self.stream, MAX_HEADER, |buf| {\n                    let data = buf.pending();\n                    let limit = data.len().min(MAX_HEADER);\n                    while let Some(off) = data[scan..limit].iter().position(|\u0026b| b == b'\\n') {\n                        let nl = scan + off;\n                        if *n_lines \u003e= line_ends.len() {\n                            return Err(ConnError::HeadersTooLarge);\n                        }\n                        line_ends[*n_lines] = nl;\n                        *n_lines += 1;\n                        if let Some(prev) = prev_nl {\n                            let gap = nl - prev;\n                            if gap == 1 || (gap == 2 \u0026\u0026 data[nl - 1] == b'\\r') {\n                                return Ok(Some(nl + 1));\n                            }\n                        }\n                        prev_nl = Some(nl);\n                        scan = nl + 1;\n                    }\n                    if data.len() \u003e= MAX_HEADER {\n                        return Err(ConnError::HeadersTooLarge);\n                    }\n                    Ok(None)\n                })\n                .map_err(|e| match e {\n                    ReadUntilError::Eof =\u003e ConnError::Closed,\n                    ReadUntilError::Io(e) =\u003e ConnError::Io(e),\n                    ReadUntilError::WouldBlock =\u003e {\n                        ConnError::Io(io::Error::from(io::ErrorKind::WouldBlock))\n                    }\n                    // The callback already checks data.len() \u003e= MAX_HEADER,\n                    // so it always returns HeadersTooLarge before the byte\n                    // limit fires.\n                    ReadUntilError::LimitReached =\u003e {\n                        unreachable!(\"should have returned ess":[],"length":0,"stats":{"Line":8}},{"line":757,"address":[],"length":0,"stats":{"Line":4}}],"covered":359,"coverable":370},{"path":["/","Users","kon","repos","kamekichi-bot","crates","kamekichi-ws","src","read_buf.rs"],"content":"//! Contiguous read buffer for streaming protocol parsing.\n//!\n//! # Layout\n//!\n//! ```text\n//!  [ consumed | pending | spare | allocated ]\n//!  0        start      end     len         cap\n//! ```\n//!\n//! - **consumed** (`0..start`) — data already processed by the caller.\n//!   [`consume`](ReadBuf::consume) advances `start` but does not discard\n//!   the bytes — they remain accessible until the next\n//!   [`compact`](ReadBuf::compact). This lets callers consume a frame\n//!   header while still borrowing the payload without copying data out.\n//! - **pending** (`start..end`) — data received but not yet processed.\n//! - **spare** (`end..len`) — initialized memory available for the\n//!   next `Read::read` call. `len` only shrinks via an explicit\n//!   [`ReadBuf::maybe_shrink_capacity`] call, so zero-initializing\n//!   the same region again and again is avoided.\n//! - **allocated** (`len..cap`) — allocated but uninitialized part of the\n//!   underlying allocation; can be initialized without reallocating.\n//!\n//! # Filling\n//!\n//! Two fill strategies:\n//!\n//! - [`ReadBuf::fill_from`] — for known lengths: loop until at least `need`\n//!   pending bytes are available. Used for WebSocket frames\n//!   where the payload length is known upfront.\n//!\n//! - [`ReadBuf::read_until`] — search-driven: read in a loop, invoking a\n//!   callback after each read until it produces a value. Used for HTTP\n//!   response header parsing where the terminator position is unknown.\n//!\n//! Both retry immediately on `EINTR`, treat `read() → 0` as EOF,\n//! and return `WouldBlock` when the stream read would block or timeout,\n//! to allow the caller to retry the operation later.\n//!\n//! # Memory lifecycle\n//!\n//! The buffer grows as needed during fills but never shrinks on its\n//! own. The caller is responsible for reclaiming memory via\n//! [`ReadBuf::compact`] (unconditional shift of pending data to offset 0),\n//! [`ReadBuf::maybe_compact`] (compact only when the consumed prefix\n//! exceeds a threshold), and [`ReadBuf::maybe_shrink_capacity`]\n//! (probabilistically release excess backing allocation).\n//! ([`ReadBuf::clear`] resets cursors without touching memory and is\n//! not a reclamation method.)\n\nuse std::io::{self, Read};\nuse std::ops::Range;\n\nuse crate::rng::Rng;\n\n/// Error from [`ReadBuf::read_until`].\n#[derive(Debug)]\npub enum ReadUntilError\u003cE\u003e {\n    /// The stream reached EOF before the callback produced a value.\n    Eof,\n    /// An IO error occurred while reading.\n    Io(io::Error),\n    /// The stream returned `WouldBlock` or `TimedOut`.\n    WouldBlock,\n    /// Pending data reached the caller's [`limit`](ReadBuf::read_until) before the callback produced a value.\n    LimitReached,\n    /// The callback error, passed through.\n    CallbackError(E),\n}\n\n/// Error from [`ReadBuf::fill_from`].\n#[derive(Debug)]\npub enum FillError {\n    /// The stream reached EOF before enough data was available.\n    Eof,\n    /// An IO error occurred while reading.\n    Io(io::Error),\n    /// The stream returned `WouldBlock` or `TimedOut`.\n    WouldBlock,\n}\n\nimpl\u003cE\u003e From\u003cFillError\u003e for ReadUntilError\u003cE\u003e {\n    fn from(e: FillError) -\u003e Self {\n        match e {\n            FillError::Eof =\u003e ReadUntilError::Eof,\n            FillError::WouldBlock =\u003e ReadUntilError::WouldBlock,\n            FillError::Io(e) =\u003e ReadUntilError::Io(e),\n        }\n    }\n}\n\n/// The main buffer container. See [module docs](self) for layout and design.\npub struct ReadBuf {\n    // Invariant: `start \u003c= end \u003c= buf.len()`.\n    buf: Vec\u003cu8\u003e,\n    start: usize,\n    end: usize,\n}\n\nimpl std::fmt::Debug for ReadBuf {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"ReadBuf\")\n            .field(\"start\", \u0026self.start)\n            .field(\"end\", \u0026self.end)\n            .field(\"len\", \u0026self.buf.len())\n            .field(\"cap\", \u0026self.buf.capacity())\n            .finish()\n    }\n}\n\nimpl ReadBuf {\n    /// Create an empty buffer with the given initial allocation.\n    pub fn with_capacity(capacity: usize) -\u003e Self {\n        ReadBuf {\n            buf: Vec::with_capacity(capacity),\n            start: 0,\n            end: 0,\n        }\n    }\n\n    /// Number of unconsumed bytes in the buffer.\n    pub fn pending_len(\u0026self) -\u003e usize {\n        debug_assert!(self.start \u003c= self.end);\n        self.end - self.start\n    }\n\n    /// Unconsumed data in the buffer.\n    pub fn pending(\u0026self) -\u003e \u0026[u8] {\n        \u0026self.buf[self.start..self.end]\n    }\n\n    /// Initialized part of the backing buffer (including read-into\n    /// and zero-initialized regions) at the given absolute range.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    ///\n    /// # Panics\n    ///\n    /// Panics if the range extends past the initialized region of the\n    /// backing buffer.\n    pub fn slice(\u0026self, range: Range\u003cusize\u003e) -\u003e \u0026[u8] {\n        \u0026self.buf[range]\n    }\n\n    /// Absolute offset of the end of pending data in the backing buffer.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    pub fn end_offset(\u0026self) -\u003e usize {\n        self.end\n    }\n\n    /// Absolute offset of the start of pending data in the backing buffer.\n    ///\n    /// Absolute offsets are invalidated by [`compact`](Self::compact).\n    pub fn start_offset(\u0026self) -\u003e usize {\n        self.start\n    }\n\n    /// Advance the read cursor past `n` bytes of pending data.\n    ///\n    /// # Panics\n    ///\n    /// May or may not panic if `n` exceeds the pending data length.\n    pub fn consume(\u0026mut self, n: usize) {\n        let pending_len = self.pending_len();\n        debug_assert!(\n            n \u003c= pending_len,\n            \"consume({n}) exceeds pending length ({pending_len})\",\n        );\n        self.start = self.end.min(self.start.saturating_add(n));\n    }\n\n    /// Ensure at least `need` bytes are available in [`pending()`](Self::pending),\n    /// reading from `reader` as necessary.\n    ///\n    /// May read more than `need` bytes if the OS provides them — the extra\n    /// data stays buffered for subsequent calls.\n    ///\n    /// On error, bytes already read within the same call remain in\n    /// the buffer, so retrying with the same `need` resumes where\n    /// the previous attempt left off.\n    pub fn fill_from(\u0026mut self, reader: \u0026mut impl Read, need: usize) -\u003e Result\u003c(), FillError\u003e {\n        let target = self.start.saturating_add(need);\n        if self.end \u003e= target {\n            return Ok(());\n        }\n        self.ensure_initialized(target);\n        while self.end \u003c target {\n            self.read_once(reader)?;\n        }\n        Ok(())\n    }\n\n    /// Read from `reader` in a loop, calling `f` after each read\n    /// until `f` returns `Ok(Some(value))` or an error occurs.\n    /// `f` may return `Ok(None)` to request more data. `f` gets\n    /// `\u0026ReadBuf` as its argument, so it can inspect the current\n    /// buffer contents and decide whether to continue or return\n    /// a value. Note, however, that for implementing incremental\n    /// scanning, the callback must manage the cursor position\n    /// itself, as it can't call mutable methods on `ReadBuf`.\n    ///\n    /// If there is already pending data in the buffer (`start \u003c\n    /// end`), `f` is called once before the first read.\n    ///\n    /// `limit` bounds how long the pacity(capacity),\n            pos: 0,\n        }\n    }\n\n    /// Whether there is unsent data in the buffer.\n    pub fn has_pending(\u0026self) -\u003e bool {\n        self.pos \u003c self.buf.len()\n    }\n\n    /// Number of bytes waiting to be sent.\n    pub fn pending_len(\u0026self) -\u003e usize {\n        self.buf.len() - self.pos\n    }\n\n    /// Append bytes to the buffer without sending.\n    pub fn push(\u0026mut self, data: \u0026[u8]) {\n        self.buf.extend_from_slice(data);\n    }\n\n    /// Append a single byte.\n    pub fn push_byte(\u0026mut self, b: u8) {\n        self.buf.push(b);\n    }\n\n    /// Reserve space for at least `additional` more bytes.\n    pub fn reserve(\u0026mut self, additional: usize) {\n        self.buf.reserve(additional);\n    }\n\n    /// Mutable reference to the last `len` bytes in the buffer.\n    pub fn last_mut(\u0026mut self, len: usize) -\u003e \u0026mut [u8] {\n        let start = self.buf.len() - len;\n        \u0026mut self.buf[start..]\n    }\n\n    /// Drain pending data to `stream`.  Retries on `Interrupted`;\n    /// propagates all other errors.\n    pub fn flush(\u0026mut self, stream: \u0026mut impl Write) -\u003e Result\u003c(), FlushError\u003e {\n        while self.pos \u003c self.buf.len() {\n            match stream.write(\u0026self.buf[self.pos..]) {\n                Ok(0) =\u003e return Err(FlushError::WriteClosed),\n                Ok(n) =\u003e self.pos += n,\n                Err(e) if e.kind() == io::ErrorKind::Interrupted =\u003e {}\n                Err(e) =\u003e return Err(FlushError::Io(e)),\n            }\n        }\n        Ok(())\n    }\n\n    /// Best-effort drain + stream flush.  Errors are silently ignored.\n    pub fn try_flush(\u0026mut self, stream: \u0026mut impl Write) {\n        let _ = self.flush(stream);\n        let _ = stream.flush();\n    }\n\n    /// Probabilistically shrink the backing allocation if capacity\n    /// exceeds `max_cap`.  Only shrinks when all data has been sent.\n    pub fn maybe_shrink(\u0026mut self, max_cap: usize, rng: \u0026mut impl Rng) {\n        if self.pos \u003e= self.buf.len() \u0026\u0026 self.buf.capacity() \u003e max_cap \u0026\u0026 rng.one_in_eight_odds() {\n            self.buf.clear();\n            self.pos = 0;\n            self.buf.shrink_to(max_cap);\n        }\n    }\n\n    /// Clear and return a mutable reference to the backing buffer\n    /// for use as scratch space.\n    pub fn as_scratch(\u0026mut self) -\u003e \u0026mut Vec\u003cu8\u003e {\n        self.buf.clear();\n        self.pos = 0;\n        \u0026mut self.buf\n    }\n\n    /// Discard all data.\n    pub fn clear(\u0026mut self) {\n        self.buf.clear();\n        self.pos = 0;\n    }\n}\n","traces":[{"line":15,"address":[],"length":0,"stats":{"Line":17}},{"line":16,"address":[],"length":0,"stats":{"Line":12}},{"line":17,"address":[],"length":0,"stats":{"Line":16}},{"line":18,"address":[],"length":0,"stats":{"Line":36}},{"line":36,"address":[],"length":0,"stats":{"Line":123}},{"line":38,"address":[],"length":0,"stats":{"Line":123}},{"line":44,"address":[],"length":0,"stats":{"Line":225}},{"line":45,"address":[],"length":0,"stats":{"Line":450}},{"line":49,"address":[],"length":0,"stats":{"Line":20}},{"line":50,"address":[],"length":0,"stats":{"Line":40}},{"line":54,"address":[],"length":0,"stats":{"Line":95}},{"line":55,"address":[],"length":0,"stats":{"Line":285}},{"line":59,"address":[],"length":0,"stats":{"Line":92}},{"line":60,"address":[],"length":0,"stats":{"Line":276}},{"line":64,"address":[],"length":0,"stats":{"Line":46}},{"line":65,"address":[],"length":0,"stats":{"Line":138}},{"line":69,"address":[],"length":0,"stats":{"Line":46}},{"line":70,"address":[],"length":0,"stats":{"Line":138}},{"line":71,"address":[],"length":0,"stats":{"Line":46}},{"line":76,"address":[],"length":0,"stats":{"Line":58}},{"line":77,"address":[],"length":0,"stats":{"Line":182}},{"line":78,"address":[],"length":0,"stats":{"Line":177}},{"line":79 dd(1);\n        v\n    }\n}\n\nstruct MockStream {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl MockStream {\n    fn new(data: Vec\u003cu8\u003e) -\u003e Self {\n        MockStream {\n            rx: Cursor::new(data),\n            tx: Vec::new(),\n        }\n    }\n}\n\nimpl Read for MockStream {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        self.rx.read(buf)\n    }\n}\n\nimpl Write for MockStream {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Build an unmasked server frame.\nfn frame(fin: bool, opcode: u8, payload: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n    let mut buf = Vec::new();\n    buf.push(if fin { 0x80 } else { 0 } | opcode);\n    let len = payload.len();\n    if len \u003c 126 {\n        buf.push(len as u8);\n    } else if len \u003c 65536 {\n        buf.push(126);\n        buf.extend_from_slice(\u0026(len as u16).to_be_bytes());\n    } else {\n        buf.push(127);\n        buf.extend_from_slice(\u0026(len as u64).to_be_bytes());\n    }\n    buf.extend_from_slice(payload);\n    buf\n}\n\n/// Build a masked server frame.\nfn masked_frame(fin: bool, opcode: u8, payload: \u0026[u8], mask: [u8; 4]) -\u003e Vec\u003cu8\u003e {\n    let mut buf = Vec::new();\n    buf.push(if fin { 0x80 } else { 0 } | opcode);\n    let len = payload.len();\n    if len \u003c 126 {\n        buf.push(0x80 | len as u8);\n    } else if len \u003c 65536 {\n        buf.push(0x80 | 126);\n        buf.extend_from_slice(\u0026(len as u16).to_be_bytes());\n    } else {\n        buf.push(0x80 | 127);\n        buf.extend_from_slice(\u0026(len as u64).to_be_bytes());\n    }\n    buf.extend_from_slice(\u0026mask);\n    for (i, \u0026b) in payload.iter().enumerate() {\n        buf.push(b ^ mask[i % 4]);\n    }\n    buf\n}\n\nfn ws(data: Vec\u003cu8\u003e) -\u003e WebSocket\u003cMockStream, CounterRng\u003e {\n    WebSocket::new(CounterRng(0)).with_stream(MockStream::new(data))\n}\n\n// ---- Length encodings ----\n\n#[test]\nfn text_7bit_length() {\n    let mut ws = ws(frame(true, OP_TEXT, b\"hello\"));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"hello\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn text_16bit_length() {\n    let payload = vec![b'x'; 200];\n    let mut ws = ws(frame(true, OP_TEXT, \u0026payload));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e {\n            assert_eq!(p.len(), 200);\n            assert!(p.bytes().all(|b| b == b'x'));\n        }\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn binary_64bit_length() {\n    let payload = vec![0xAB; 65536];\n    let mut ws = ws(frame(true, OP_BINARY, \u0026payload));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Binary(b) =\u003e {\n            assert_eq!(b.len(), 65536);\n            assert!(b.iter().all(|\u0026x| x == 0xAB));\n        }\n        other =\u003e panic!(\"expected Binary, got {other:?}\"),\n    }\n}\n\n#[test]\nfn payload_too_large() {\n    let mut data = vec![0x82, 127]; // FIN + binary, 64-bit length\n    data.extend_from_slice(\u0026(DEFAULT_MAX_PAYLOAD as u64 + 1).to_be_bytes());\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::PayloadTooLarge(_)))\n    ));\n}\n\n// ---- Masked server frames (RFC 6455 §5.1: MUST reject) ----\n\n#[test]\nfn masked_server_frame_rejected() {\n    let mask = [0x12, 0x34, 0x56, 0x78];\n    let mut ws = ws(masked_frame(true, OP_TEXT, b\"hello\", mask));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::MaskedServerFrame))\n    ));\n}\n\n// ---- Binary ----\n\n#[test]\nfn binary_frame() {\n    let payload = vec![0, 1, 2, 0xFF];\n    let mut ws = ws(frame(true, OP_BINARY, \u0026payload));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Binary(b) =\u003e assert_eq!(b, \u0026payload),\n        other =\u003e panic!(\"expected Binary, got {other:?}\"),\n    }\n}\n\n// ---- Control frames ----\n\n#[test]\nfn ping_replies_pong_then_returns_next() {\n    let mut data = frame(true, OP_PING, b\"ping-data\");\n    data.extend(frame(true, OP_TEXT, b\"after\"));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"after\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n    assert!(!ws.inner().tx.is_empty(), \"pong should have been written\");\n}\n\n#[test]\nfn pong_ignored() {\n    let mut data = frame(true, OP_PONG, b\"\");\n    data.extend(frame(true, OP_TEXT, b\"after\"));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"after\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn close_empty_payload() {\n    let mut ws = ws(frame(true, OP_CLOSE, b\"\"));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Close(code, reason) =\u003e {\n            assert_eq!(code, None);\n            assert!(reason.is_empty());\n        }\n        other =\u003e panic!(\"expected Close, got {other:?}\"),\n    }\n}\n\n#[test]\nfn close_with_code_and_reason() {\n    let mut payload = 1000u16.to_be_bytes().to_vec();\n    payload.extend_from_slice(b\"normal\");\n    let mut ws = ws(frame(true, OP_CLOSE, \u0026payload));\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Close(code, reason) =\u003e {\n            assert_eq!(code, Some(1000));\n            assert_eq!(reason, \"normal\");\n        }\n        other =\u003e panic!(\"expected Close, got {other:?}\"),\n    }\n}\n\n#[test]\nfn close_one_byte_is_error() {\n    let mut ws = ws(frame(true, OP_CLOSE, b\"x\"));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::BadClosePayload))\n    ));\n}\n\n#[test]\nfn fragmented_control_is_error() {\n    let mut ws = ws(frame(false, OP_PING, b\"\"));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::FragmentedControl))\n    ));\n}\n\n#[test]\nfn control_payload_too_large() {\n    let mut ws = ws(frame(true, OP_PING, \u0026[0u8; 126]));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::ControlPayloadTooLarge(126)))\n    ));\n}\n\n// ---- Fragmentation ----\n\n#[test]\nfn fragmented_text() {\n    let mut data = frame(false, OP_TEXT, b\"hel\");\n    data.extend(frame(false, OP_CONTINUATION, b\"lo \"));\n    data.extend(frame(true, OP_CONTINUATION, b\"world\"));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"hello world\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn fragmented_binary() {\n    let mut data = frame(false, OP_BINARY, \u0026[1, 2]);\n    data.extend(frame(true, OP_CONTINUATION, \u0026[3, 4]));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Binary(b) =\u003e assert_eq!(b, [1, 2, 3, 4]),\n        other =\u003e panic!(\"expected Binary, got {other:?}\"),\n    }\n}\n\n#[test]\nfn control_interleaved_in_fragments() {\n    let mut data = frame(false, OP_TEXT, b\"hel\");\n    data.extend(frame(true, OP_PING, b\"\"));\n    data.extend(frame(true, OP_CONTINUATION, b\"lo\"));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"hello\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn unexpected_continuation() {\n    let mut ws = ws(frame(true, OP_CONTINUATION, b\"oops\"));\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::UnexpectedContinuation))\n    ));\n}\n\n#[test]\nfn data_during_fragmentation() {\n    let mut data = frame(false, OP_TEXT, b\"start\");\n    data.extend(frame(true, OP_TEXT, b\"new\"));\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::DataDuringFragmentation))\n    ));\n}\n\n// ---- Error cases ----\n\n#[test]\nfn reserved_bits_set() {\n    let mut ws = ws(vec![0x80 | 0x10 | OP_TEXT, 0]); // RSV1 set\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::BadReservedBits(_)))\n    ));\n}\n\n#[test]\nfn unknown_opcode() {\n    let mut ws = ws(vec![0x80 | 0x03, 0]); // opcode 3 is reserved\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::UnknownOpcode(3)))\n    ));\n}\n\n#[test]\nfn invalid_utf8_text() {\n    let mut ws = ws(frame(true, OP_TEXT, \u0026[0xFF, 0xFE]));\n    match ws.read_message() {\n        Err(Error::Reconnect(ConnError::InvalidUtf8(_))) =\u003e {}\n        other =\u003e panic!(\"expected InvalidUtf8, got {other:?}\"),\n    }\n}\n\n#[test]\nfn fragmented_text_invalid_utf8_rejected() {\n    // Invalid byte in first fragment — rejected once enough data arrives.\n    let mut data = frame(false, OP_TEXT, \u0026[0xFF]);\n    data.extend(frame(true, OP_CONTINUATION, b\"hello\"));\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidUtf8(_)))\n    ));\n}\n\n#[test]\nfn fragmented_text_split_multibyte() {\n    // ä = [0xC3, 0xA4], split across fragments.\n    let mut data = frame(false, OP_TEXT, \u0026[0xC3]);\n    data.extend(frame(true, OP_CONTINUATION, \u0026[0xA4]));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"ä\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn fragmented_text_incomplete_at_end() {\n    // Incomplete multi-byte sequence at the end of a complete message.\n    let mut data = frame(false, OP_TEXT, b\"hello\");\n    data.extend(frame(true, OP_CONTINUATION, \u0026[0xC3]));\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::InvalidUtf8(_)))\n    ));\n}\n\n#[test]\nfn fragmented_text_three_byte_split() {\n    // U+2019 = [0xE2, 0x80, 0x99], split 1+2 across fragments.\n    let mut data = frame(false, OP_TEXT, \u0026[0xE2]);\n    data.extend(frame(true, OP_CONTINUATION, \u0026[0x80, 0x99]));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"\\u{2019}\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn fragmented_text_split_across_three_fragments() {\n    // U+2019 = [0xE2, 0x80, 0x99], one byte per fragment.\n    let mut data = frame(false, OP_TEXT, \u0026[0xE2]);\n    data.extend(frame(false, OP_CONTINUATION, \u0026[0x80]));\n    data.extend(frame(true, OP_CONTINUATION, \u0026[0x99]));\n    let mut ws = ws(data);\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(t) =\u003e assert_eq!(t, \"\\u{2019}\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn eof_mid_frame() {\n    let mut data = vec![0x82, 100]; // FIN + binary, claims 100 bytes\n    data.extend_from_slice(\u0026[0; 5]); // only 5 follow\n    let mut ws = ws(data);\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::Closed))\n    ));\n}\n\n#[test]\nfn io_error_mid_frame() {\n    // Valid frame header claiming 100-byte binary payload, but the\n    // reader errors after delivering only the header.\n    struct ErrorAfterHeader {\n        header: Cursor\u003cVec\u003cu8\u003e\u003e,\n        errored: bool,\n    }\n    impl Read for ErrorAfterHeader {\n        fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n            let n = self.header.read(buf)?;\n            if n \u003e 0 {\n                return Ok(n);\n            }\n            if !self.errored {\n                self.errored = true;\n                return Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"));\n            }\n            Ok(0)\n        }\n    }\n    impl Write for ErrorAfterHeader {\n        fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n            Ok(buf.len())\n        }\n        fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n            Ok(())\n        }\n    }\n    let header = vec![0x82, 100]; // FIN + binary, claims 100 bytes\n    let mut ws = WebSocket::new(CounterRng(0)).with_stream(ErrorAfterHeader {\n        header: Cursor::new(header),\n        errored: false,\n    });\n    assert!(matches!(\n        ws.read_message(),\n        Err(Error::Reconnect(ConnError::Io(_)))\n    ));\n}\n\n// ---- Compaction ----\n\n#[test]\nfn many_frames_survive_compaction() {\n    // ~20KB of frames forces start past MAX_HEADER (8192), triggering compaction\n    let payload = vec![b'a'; 1000];\n    let mut data = Vec::new();\n    for _ in 0..20 {\n        data.extend(frame(true, OP_TEXT, \u0026payload));\n    }\n    data.extend(frame(true, OP_TEXT, b\"final\"));\n\n    let mut ws = ws(data);\n    for _ in 0..20 {\n        match ws.read_message().unwrap().message().unwrap() {\n            Message::Text(p) =\u003e assert_eq!(p.len(), 1000),\n            other =\u003e panic!(\"expected Text, got {other:?}\"),\n        }\n    }\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"final\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn sequential_messages_all_correct() {\n    let mut data = Vec::new();\n    for i in 0..100u32 {\n        data.extend(frame(true, OP_TEXT, format!(\"msg-{i}\").as_bytes()));\n    }\n    let mut ws = ws(data);\n    for i in 0..100u32 {\n        match ws.read_message().unwrap().message().unwrap() {\n            Message::Text(p) =\u003e assert_eq!(p, format!(\"msg-{i}\")),\n            other =\u003e panic!(\"expected Text, got {other:?}\"),\n        }\n    }\n}\n\n// ---- Helpers for connect, send, and partial-read tests ----\n\nfn extract_ws_key(request: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n    let needle = b\"Sec-WebSocket-Key: \";\n    let pos = request\n        .windows(needle.len())\n        .position(|w| w == needle.as_slice())\n        .expect(\"request must contain Sec-WebSocket-Key\");\n    let start = pos + needle.len();\n    let end = start + request[start..].iter().position(|\u0026b| b == b'\\r').unwrap();\n    request[start..end].to_vec()\n}\n\nfn compute_accept(key: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n    let mut ctx = ring::digest::Context::new(\u0026ring::digest::SHA1_FOR_LEGACY_USE_ONLY);\n    ctx.update(key);\n    ctx.update(WS_GUID.as_bytes());\n    let mut buf = [0u8; 28];\n    base64::engine::general_purpose::STANDARD\n        .encode_slice(ctx.finish().as_ref(), \u0026mut buf)\n        .unwrap();\n    buf.to_vec()\n}\n\nfn parse_client_frame(data: \u0026[u8]) -\u003e (u8, Vec\u003cu8\u003e) {\n    assert_eq!(data[0] \u0026 FIN, FIN, \"FIN must be set\");\n    assert_eq!(data[1] \u0026 MASK_BIT, MASK_BIT, \"MASK must be set\");\n    let opcode = data[0] \u0026 OPCODE_MASK;\n    let len7 = (data[1] \u0026 LEN_MASK) as usize;\n    let (hdr, payload_len) = match len7 {\n        n @ 0..=125 =\u003e (2, n),\n        126 =\u003e (4, u16::from_be_bytes([data[2], data[3]]) as usize),\n        _ =\u003e (\n            10,\n            u64::from_be_bytes(data[2..10].try_into().unwrap()) as usize,\n        ),\n    };\n    let mask: [u8; 4] = data[hdr..hdr + 4].try_into().unwrap();\n    let mut payload = data[hdr + 4..hdr + 4 + payload_len].to_vec();\n    for (i, b) in payload.iter_mut().enumerate() {\n        *b ^= mask[i % 4];\n    }\n    (opcode, payload)\n}\n\nstruct ConnectMock {\n    tx: Vec\u003cu8\u003e,\n    rx: Vec\u003cu8\u003e,\n    rx_pos: usize,\n    auto: bool,\n    include_upgrade: bool,\n    include_connection: bool,\n    bare_lf: bool,\n    subprotocol: Option\u003cString\u003e,\n}\n\nimpl ConnectMock {\n    fn auto() -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx: Vec::new(),\n            rx_pos: 0,\n            auto: true,\n            include_upgrade: true,\n            include_connection: true,\n            bare_lf: false,\n            subprotocol: None,\n        }\n    }\n    fn auto_bare_lf() -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx: Vec::new(),\n            rx_pos: 0,\n            auto: true,\n            include_upgrade: true,\n            include_connection: true,\n            bare_lf: true,\n            subprotocol: None,\n        }\n    }\n    fn auto_with_extra(extra: Vec\u003cu8\u003e) -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx: extra,\n            rx_pos: 0,\n            auto: true,\n            include_upgrade: true,\n            include_connection: true,\n            bare_lf: false,\n            subprotocol: None,\n        }\n    }\n    fn auto_without_upgrade() -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx: Vec::new(),\n            rx_pos: 0,\n            auto: true,\n            include_upgrade: false,\n            include_connection: true,\n            bare_lf: false,\n            subprotocol: None,\n        }\n    }\n    fn auto_without_connection() -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx: Vec::new(),\n            rx_pos: 0,\n            auto: true,\n            include_upgrade: true,\n            include_connection: false,\n            bare_lf: false,\n            subprotocol: None,\n        }\n    }\n    fn auto_with_subprotocol(proto: \u0026str) -\u003e Self {\n        ConnectMock {\n            subprotocol: Some(proto.to_owned()),\n            ..ConnectMock::auto()\n        }\n    }\n    fn with_response(rx: Vec\u003cu8\u003e) -\u003e Self {\n        ConnectMock {\n            tx: Vec::new(),\n            rx,\n            rx_pos: 0,\n            auto: false,\n            include_upgrade: true,\n            include_connection: true,\n            bare_lf: false,\n            subprotocol: None,\n        }\n    }\n}\n\nimpl Read for ConnectMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.auto {\n            let key = extract_ws_key(\u0026self.tx);\n            let accept = compute_accept(\u0026key);\n            let accept_str = std::str::from_utf8(\u0026accept).unwrap();\n            let extra = std::mem::take(\u0026mut self.rx);\n            let nl = if self.bare_lf { \"\\n\" } else { \"\\r\\n\" };\n            let mut response = format!(\"HTTP/1.1 101 Switching Protocols{nl}\");\n            if self.include_upgrade {\n                response.push_str(\u0026format!(\"Upgrade: websocket{nl}\"));\n            }\n            if self.include_connection {\n                response.push_str(\u0026format!(\"Connection: Upgrade{nl}\"));\n            }\n            if let Some(ref proto) = self.subprotocol {\n                response.push_str(\u0026format!(\"Sec-WebSocket-Protocol: {proto}{nl}\"));\n            }\n            response.push_str(\u0026format!(\"Sec-WebSocket-Accept: {accept_str}{nl}{nl}\"));\n            self.rx = response.into_bytes();\n            self.rx.extend(extra);\n            self.auto = false;\n        }\n        let remaining = \u0026self.rx[self.rx_pos..];\n        let n = remaining.len().min(buf.len());\n        buf[..n].copy_from_slice(\u0026remaining[..n]);\n        self.rx_pos += n;\n        Ok(n)\n    }\n}\n\nimpl Write for ConnectMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\nstruct ChunkedMock {\n    rx: Cursor\u003cVec\u003cu8\u003e\u003e,\n    tx: Vec\u003cu8\u003e,\n    chunk_size: usize,\n    blocks: usize,\n}\n\nimpl ChunkedMock {\n    fn new(data: Vec\u003cu8\u003e, chunk_size: usize) -\u003e Self {\n        ChunkedMock {\n            rx: Cursor::new(data),\n            tx: Vec::new(),\n            chunk_size,\n            blocks: 0,\n        }\n    }\n\n    fn with_blocks(data: Vec\u003cu8\u003e, chunk_size: usize, blocks: usize) -\u003e Self {\n        ChunkedMock {\n            rx: Cursor::new(data),\n            tx: Vec::new(),\n            chunk_size,\n            blocks,\n        }\n    }\n}\n\nimpl Read for ChunkedMock {\n    fn read(\u0026mut self, buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        if self.blocks \u003e 0 {\n            self.blocks -= 1;\n            return Err(io::Error::new(io::ErrorKind::WouldBlock, \"would block\"));\n        }\n        let limit = buf.len().min(self.chunk_size);\n        self.rx.read(\u0026mut buf[..limit])\n    }\n}\n\nimpl Write for ChunkedMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n// ---- Connect ----\n\n#[test]\nfn connect_success() {\n    let _ws = WebSocket::new(CounterRng(0))\n        .connect(ConnectMock::auto(), \"example.com\", \"/ws\")\n        .unwrap();\n}\n\n#[test]\nfn connect_bare_lf_headers() {\n    let _ws = WebSocket::new(CounterRng(0))\n        .connect(ConnectMock::auto_bare_lf(), \"example.com\", \"/ws\")\n        .unwrap();\n}\n\n#[test]\nfn connect_preserves_leftover() {\n    let extra = frame(true, OP_TEXT, b\"leftover\");\n    let mut ws = WebSocket::new(CounterRng(0))\n        .connect(ConnectMock::auto_with_extra(extra), \"example.com\", \"/ws\")\n        .unwrap();\n    match ws.read_message().unwrap().message().unwrap() {\n        Message::Text(p) =\u003e assert_eq!(p, \"leftover\"),\n        other =\u003e panic!(\"expected Text, got {other:?}\"),\n    }\n}\n\n#[test]\nfn connect_bad_status() {\n    let rx = b\"HTTP/1.1 200 OK\\r\\nContent-Length: 0\\r\\n\\r\\n\".to_vec();\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(ConnectMock::with_response(rx), \"example.com\", \"/\"),\n        Err(Error::Reconnect(ConnError::BadStatus))\n    ));\n}\n\n#[test]\nfn connect_missing_accept() {\n    let rx = b\"HTTP/1.1 101 Switching Protocols\\r\\n\\\n                    Upgrade: websocket\\r\\n\\\n                    \\r\\n\"\n        .to_vec();\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(ConnectMock::with_response(rx), \"example.com\", \"/\"),\n        Err(Error::Reconnect(ConnError::MissingAccept))\n    ));\n}\n\n#[test]\nfn connect_bad_accept() {\n    let rx = b\"HTTP/1.1 101 Switching Protocols\\r\\n\\\n                    Sec-WebSocket-Accept: dGhlIHNhbXBsZSBub25jZQ==\\r\\n\\\n                    \\r\\n\"\n        .to_vec();\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(ConnectMock::with_response(rx), \"example.com\", \"/\"),\n        Err(Error::Reconnect(ConnError::BadAccept))\n    ));\n}\n\n#[test]\nfn connect_headers_too_large() {\n    let rx = vec![b'X'; 8300];\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(ConnectMock::with_response(rx), \"example.com\", \"/\"),\n        Err(Error::Reconnect(ConnError::HeadersTooLarge))\n    ));\n}\n\n#[test]\nfn connect_missing_upgrade() {\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(\n            ConnectMock::auto_without_upgrade(),\n            \"example.com\",\n            \"/\"\n        ),\n        Err(Error::Reconnect(ConnError::MissingUpgrade))\n    ));\n}\n\n#[test]\nfn connect_missing_connection() {\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(\n            ConnectMock::auto_without_connection(),\n            \"example.com\",\n            \"/\"\n        ),\n        Err(Error::Reconnect(ConnError::MissingConnection))\n    ));\n}\n\n#[test]\nfn connect_eof_mid_headers() {\n    let rx = b\"HTTP/1.1 101 Switch\".to_vec();\n    assert!(matches!(\n        WebSocket::new(CounterRng(0)).connect(ConnectMock::with_response(rx), \"example.com\", \"/\"),\n        Err(Error::Reconnect(ConnError::Closed))\n    ));\n}\n\n// ---- Connect error paths ----\n\n/// Stream that fails on write (covers From\u003cio::Error\u003e for ConnectionError).\nstruct WriteFailConnectMock;\n\nimpl Read for WriteFailConnectMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Ok(0)\n    }\n}\n\nimpl Write for WriteFailConnectMock {\n    fn write(\u0026mut self, _buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::BrokenPipe, \"broken\"))\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Stream that accepts the handshake write, then returns an error on read.\nstruct ReadErrorConnectMock {\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl Read for ReadErrorConnectMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::ConnectionReset, \"reset\"))\n    }\n}\n\nimpl Write for ReadErrorConnectMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n/// Stream that accepts the handshake write, then returns WouldBlock on read.\nstruct ReadWouldBlockConnectMock {\n    tx: Vec\u003cu8\u003e,\n}\n\nimpl Read for ReadWouldBlockConnectMock {\n    fn read(\u0026mut self, _buf: \u0026mut [u8]) -\u003e io::Result\u003cusize\u003e {\n        Err(io::Error::new(io::ErrorKind::WouldBlock, \"blocked\"))\n    }\n}\n\nimpl Write for ReadWouldBlockConnectMock {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        self.tx.extend_from_slice(buf);\n        Ok(buf.len())\n    }\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        Ok(())\n    }\n}\n\n#[test]\nfn connect_write_fails() {\n    let result = WebSocket::new(CounterRng(0)).connect(WriteFailConnectMock, \"example.com\", \"/\");\n    assert!(matches!(result, Err(Error::Reconnect(ConnError::Io(_)))));\n}\n\n#[test]\nfn connect_io_error_during_headers() {\n    let result = WebSocket::new(CounterRng(0)).connect(\n        ReadErrorConnectMock { tx: Vec::new() },\n        \"example.com\",\n        \"/\",\n    );\n    assert!(matches!(result, Err(Error::Reconnect(ConnError::Io(_)))));\n}\n\n#[test]\nfn connect_would_block_during_headers() {\n    let result = WebSocket::new(CounterRng(0)).connect(\n        ReadWouldBlockConnectMock { tx: Vec::new() },\n        \"example.com\",\n        \"/\",\n    );\n    assert!(matches!(result, Err(Error::Reconnect(ConnError::Io(_)))));\n}\n\n// ---- Send frame verification ----\n\n#[test]\nfn send_text_verified() {\n    let mut ws = ws(Vec::new());\n    ws.send_text(\"hello\").unwrap();\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_TEXT);\n    assert_eq!(payload, b\"hello\");\n}\n\n#[test]\nfn send_text_16bit_verified() {\n    let text: String = \"x\".repeat(200);\n    let mut ws = ws(Vec::new());\n    ws.send_text(\u0026text).unwrap();\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_TEXT);\n    assert_eq!(payload.len(), 200);\n}\n\n#[test]\nfn close_echo_verified() {\n    let mut body = 1000u16.to_be_bytes().to_vec();\n    body.extend_from_slice(b\"goodbye\");\n    let mut ws = ws(frame(true, OP_CLOSE, \u0026body));\n    let _ = ws.read_message().unwrap().message().unwrap();\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_CLOSE);\n    assert_eq!(payload, 1000u16.to_be_bytes());\n}\n\n#[test]\nfn ping_reply_verified() {\n    let mut data = frame(true, OP_PING, b\"ping-data\");\n    data.extend(frame(true, OP_TEXT, b\"x\"));\n    let mut ws = ws(data);\n    let _ = ws.read_message().unwrap().message().unwrap();\n    let (opcode, payload) = parse_client_frame(\u0026ws.inner().tx);\n    assert_eq!(opcode, OP_PONG);\n    assert_eq!(payload, b\"ping-data\");\n}\n\n// ---- Close code validation ----\n\n#[test]\nfn send_close_valid_code() {\n    let mut ws = ws(Vec::new());\n    ws.send_close(1000, \"normal\").unwrap();\n}\n\n#[test]\nfn send_close_rejects_zero() {\n    let mut ws = ws(Vec::new());\n    assert!(matches!(\n        ws.send_close(0, \"\"),\n        Err(Error::Fatal(CallerError::InvalidCloseCode(0)))\n    ));\n}\n\n#[test]\nfn send_close_rejects_low_codes() {\n    let mut ws = ws(Vec::new());\n    assert!(matches!(\n        ws.send_close(999, \"\"),\n        Err(Error::Fatal(CallerError::InvalidCloseCode(999)))\n    ));\n}\n\n#[test]\nfn send_close_rejects_1005() {\n    let mut ws = ws(Vec::new());\n    assert!(matches!(\n        ws.send_close(1005, \"\"),\n        Err(Error::Fatal(CallerError::InvalidCloseCode(1005)))\n    ));\n}\n\n#[test]\nfn send_close_rejects_1006() {\n    let mut ws = ws(Vec::new());\n    assert!(matches!(\n        ws.send_close(1006, \"\"),\n        Err(Error::Fatal(CallerError::InvalidCloseCode(1006)))\n    ));\n}\n\n#[test]\nfn send_close_rejects_1015() {\n    let mut ws = ws(Vec::new());\n    assert!(matche
